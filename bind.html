<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>樂森藥局 - 專屬領藥綁定</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* 整體背景與排版 */
    body { background-color: #f4fcf6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
    .container { max-width: 460px; width: 100%; padding: 0; }
    
    /* 頂部 LOGO 區塊 */
    .brand-header { text-align: center; margin-bottom: 20px; margin-top: 10px; }
    .brand-title { font-weight: 900; font-size: 2.2rem; letter-spacing: 2px; color: #06C755; margin-bottom: 5px; } 
    .brand-subtitle { font-size: 0.95rem; color: #6c757d; font-weight: bold; letter-spacing: 1px; margin: 0; }

    /* 主卡片容器 */
    .main-card { background: #ffffff; border-radius: 24px; box-shadow: 0 10px 30px rgba(6, 199, 85, 0.08); overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
    
    /* 🔥 圖片修復：移除 max-height，讓圖片依原比例自然顯示 */
    .hero-banner { width: 100%; height: auto; display: block; border-bottom: 1px solid #f0f0f0; object-fit: contain; background-color: #fff; }

    .card-body { padding: 30px 20px; }
    
    /* 標題與說明 */
    .section-title { font-weight: 900; color: #222; font-size: 1.35rem; text-align: center; margin-bottom: 8px; }
    .section-desc { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.5; }
    
    /* LINE 帳號顯示區塊 */
    .user-profile { background: #f8f9fa; padding: 12px 15px; border-radius: 16px; margin-bottom: 25px; display: flex; align-items: center; border: 1px solid #eee; }
    .user-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid #06C755; background-color: #fff; }
    .user-info-text { display: flex; flex-direction: column; }
    .user-label { font-size: 0.75rem; color: #888; margin-bottom: 2px; }
    .user-name { font-weight: bold; color: #333; font-size: 1.05rem; }

    /* 表單輸入框優化 */
    .form-label { font-size: 0.95rem; font-weight: 800; color: #1e8753; margin-bottom: 8px; }
    .form-control { border-radius: 12px; padding: 12px 15px; border: 1px solid #ddd; font-size: 1.05rem; background-color: #fafafa; transition: all 0.2s; }
    .form-control:focus { background-color: #fff; border-color: #06C755; box-shadow: 0 0 0 4px rgba(6, 199, 85, 0.15); outline: none; }
    
    /* 隱私權打勾區塊 */
    .form-check { margin-top: 15px; margin-bottom: 25px; }
    .form-check-input { width: 1.2rem; height: 1.2rem; margin-top: 0.15rem; }
    .form-check-input:checked { background-color: #06C755; border-color: #06C755; }
    .form-check-label { font-size: 0.85rem; color: #666; line-height: 1.5; padding-left: 5px; }
    
    /* 底部大按鈕 */
    .btn-submit { background-color: #06C755; color: white; border: none; border-radius: 14px; padding: 15px; font-size: 1.15rem; font-weight: bold; width: 100%; box-shadow: 0 6px 15px rgba(6, 199, 85, 0.3); transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .btn-submit:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(6, 199, 85, 0.2); }

    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner-border text-success" role="status" style="width: 3.5rem; height: 3.5rem;"></div>
  <p class="mt-3 text-secondary fw-bold fs-5" id="loadingText">系統連線中...</p>
</div>

<div class="container">
  <div class="brand-header">
    <h1 class="brand-title">樂森藥局</h1>
    <p class="brand-subtitle">專屬領藥通知綁定</p>
  </div>

  <div class="main-card" id="formContent" style="display: none;">
    <img src="10.png" class="hero-banner" alt="LINE 綁定通知" onerror="this.style.display='none'">
    
    <div class="card-body">
      <div class="section-title">建立您的專屬藥歷檔案</div>
      <div class="section-desc">綁定後，藥師就能直接透過 LINE 通知您來拿藥囉！</div>

      <div class="user-profile">
        <img id="userThumb" src="https://placehold.co/50" class="user-avatar">
        <div class="user-info-text">
          <span class="user-label">當前綁定 LINE 帳號</span>
          <span class="user-name" id="userNameDisplay">載入中...</span>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label"><i class="bi bi-person-fill"></i> 領藥人姓名</label>
        <input type="text" class="form-control" id="bName" placeholder="例如：陳大明">
      </div>
      
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-telephone-fill"></i> 聯絡電話</label>
        <input type="tel" class="form-control" id="bPhone" placeholder="例如：0912345678">
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="privacyConsentBind">
        <label class="form-check-label" for="privacyConsentBind">
          我已詳細閱讀並同意 <a href="#" onclick="showPrivacyModal(event)" class="text-success fw-bold text-decoration-none">隱私權保護與服務條款</a>。
        </label>
      </div>

      <button class="btn-submit" onclick="submitBind()">
        <i class="bi bi-link-45deg fs-4"></i> 確認綁定 LINE 通知
      </button>
    </div>
  </div>
</div>

<div class="modal fade" id="privacyModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-light">
        <h5 class="modal-title fw-bold text-dark"><i class="bi bi-shield-check text-success"></i> 隱私權保護與服務條款</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" style="font-size: 0.95rem; line-height: 1.6; color: #444;">
        <p>歡迎您使用樂森藥局雲端服務。為保障您的隱私權與醫療資訊安全，請詳閱以下條款：</p>
        <p class="fw-bold text-dark mb-1">1. 資料蒐集目的與範圍</p>
        <p class="text-muted small">本系統僅為提供「處方箋調劑、領藥通知及藥事衛教服務」之目的，蒐集您填寫之姓名、電話與 LINE 帳號資訊。所有資料皆依台灣《個人資料保護法》妥善保護。</p>
        <p class="fw-bold text-dark mb-1 mt-3">2. 當事人權利</p>
        <p class="text-muted small">您隨時可向樂森藥局提出查詢、修改或刪除您個人資料之要求。</p>
      </div>
      <div class="modal-footer bg-light">
        <button type="button" class="btn btn-success w-100 fw-bold" data-bs-dismiss="modal">我已了解並同意</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ⚠️ 確保這兩行與您 index.html 中的設定完全一致
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyUXCejmkI52ZJVUN1K1t1j2ZvfdZMCgHsgB79okITgzn7to2sfte43R5I0GOQnFp1opQ/exec"; 
  const LIFF_ID = "2008912977-DuJTm5u1"; 

  let lineUserId = "", lineDisplayName = "", linePictureUrl = "";

  window.onload = function() { 
    initLiff(); 
  };

  function initLiff() {
    liff.init({ liffId: LIFF_ID }).then(() => {
      if (liff.isLoggedIn()) {
        liff.getProfile().then(profile => {
          lineUserId = profile.userId; 
          lineDisplayName = profile.displayName; 
          linePictureUrl = profile.pictureUrl || "";
          
          document.getElementById('userNameDisplay').innerText = lineDisplayName;
          document.getElementById('bName').value = lineDisplayName; 
          if(profile.pictureUrl) document.getElementById('userThumb').src = profile.pictureUrl;
          
          // 隱藏 Loading，顯示表單
          document.getElementById('loading').style.display = 'none';
          document.getElementById('formContent').style.display = 'block';
        });
      } else {
        // 如果沒有登入，強迫登入並導向回這個獨立綁定頁面 (bind.html)
        liff.login({ redirectUri: window.location.href });
      }
    }).catch(err => { 
      alert("系統初始化失敗，請稍後再試。");
      document.getElementById('loading').style.display = 'none'; 
    });
  }

  function showPrivacyModal(event) { 
    event.preventDefault(); 
    new bootstrap.Modal(document.getElementById('privacyModal')).show(); 
  }

  function submitBind() {
    const name = document.getElementById('bName').value.trim(); 
    const phone = document.getElementById('bPhone').value.trim();
    const isConsent = document.getElementById('privacyConsentBind').checked;

    if (!name || phone.length < 9) return alert("⚠️ 請填寫完整的領藥人姓名與正確的手機號碼！");
    if (!isConsent) return alert("⚠️ 請先閱讀並勾選同意「隱私權保護與服務條款」才能完成綁定喔！");

    document.getElementById('loadingText').innerText = "安全連線綁定中...";
    document.getElementById('loading').style.display = 'flex'; 
    
    fetch(GAS_URL, { 
      method: "POST", 
      body: JSON.stringify({ 
        action: "upload", 
        name: name, 
        lineName: lineDisplayName, 
        linePic: linePictureUrl, 
        phone: phone, 
        dept: "LINE綁定", 
        notify: "LINE通知", 
        fileData: "", 
        fileName: "", 
        lineUserId: lineUserId, 
        isRegister: true 
      }) 
    })
    .then(res => res.json())
    .then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success') { 
        alert("🎉 綁定成功！\n藥局未來將能透過 LINE 即時通知您領藥時間。"); 
        if(liff.isInClient()) liff.closeWindow(); 
      } 
      else if(res.status === 'duplicate') { 
        alert("💡 您已經成功綁定過了喔！不需重複綁定。"); 
        if(liff.isInClient()) liff.closeWindow(); 
      } 
      else { 
        alert("❌ 綁定失敗：" + res.message); 
      }
    }).catch(err => { 
      document.getElementById('loading').style.display = 'none'; 
      alert("網路連線異常，請確認網路狀態後再試一次。");
    });
  }
</script>
</body>
</html>
