<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>樂森藥局 雲服務</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { background-color: #fcfcfc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .container { max-width: 600px; padding: 0; flex-grow: 1; display: flex; flex-direction: column; margin: 0 auto; width: 100%; height: 100%; background: #ffffff; box-shadow: 0 0 20px rgba(0,0,0,0.02); }
    .hidden-mode { display: none !important; } 
    #view-home { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
    .brand-header { background: #ffffff; padding: 30px 20px 10px; text-align: center; margin-bottom: 5px; flex-shrink: 0; }
    .brand-title { font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 3px; color: #06C755; } 
    .brand-subtitle { font-size: 0.85rem; color: #6c757d; margin-bottom: 0; font-weight: 500; letter-spacing: 1px; }
    .home-content { display: flex; flex-direction: column; flex-grow: 1; padding: 0 0 30px 0; min-height: 0; }
    .home-content-wrapper { max-width: 360px; width: 100%; margin: 0 auto; padding: 0 15px; box-sizing: border-box; }
    
    .user-card { background: #f8f9fa; padding: 10px 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #f0f2f5; display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; }
    .user-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 2px solid #06C755; }
    
    .home-btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; justify-items: center; }
    .menu-btn { background: transparent !important; border: none !important; box-shadow: none !important; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); outline: none; cursor: pointer; padding: 0; width: 100%; }
    .menu-btn:active { transform: scale(0.96); opacity: 0.9; }
    .menu-icon { width: 105px; height: 105px; margin-bottom: 8px; object-fit: contain; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.06)); }
    .menu-btn span { font-size: 1.05rem; font-weight: 800; letter-spacing: 0.5px; color: #444; text-align: center; line-height: 1.3; }
    
    .main-btn { grid-column: 1 / -1; width: 100%; background: #ffffff !important; border: 1px solid #eef0f2 !important; border-radius: 16px; padding: 12px 10px 15px 10px; box-shadow: 0 6px 20px rgba(6, 199, 85, 0.08) !important; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
    .menu-banner { width: 100%; height: auto; object-fit: contain; margin-bottom: 8px; }
    .main-btn-text { font-size: 1.2rem; font-weight: 900; color: #333; letter-spacing: 0.5px; }

    .sub-view { flex-grow: 1; padding: 15px 15px 30px 15px; overflow-y: auto; height: 100%; }
    .back-btn-container { margin-bottom: 15px; position: sticky; top: 0; z-index: 10; background: #ffffff; padding-top: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0f2f5; }
    .back-btn { font-size: 1rem; font-weight: bold; color: #495057; padding: 8px 18px; background: #f8f9fa; border-radius: 50px; display: inline-flex; align-items: center; border: none; transition: 0.2s; }
    .back-btn i { font-size: 1.2rem; margin-right: 5px; color: #06C755; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    
    .preview-box { width: 100%; height: 180px; background: #f8f9fa; border: 2px dashed #06C755; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; margin-bottom: 15px; }
    .placeholder-text { color: #06C755; text-align: center; font-size: 0.95rem; font-weight: bold; }
    .thumb-wrap { position: relative; width: 100%; padding-top: 100%; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
    .thumb-wrap img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .thumb-remove { position: absolute; top: 4px; right: 4px; background: rgba(220,53,69,0.9); color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; border: none; line-height: 1; padding: 0; }
    
    .rx-card { border: 1px solid #20935A; border-radius: 12px; overflow: hidden; margin-bottom: 20px; background: #fff; }
    .rx-header { background-color: #20935A; color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .rx-header .badge { background-color: #fff; color: #20935A; font-weight: bold; }
    .rx-progress-box { border: 2px solid #17A2B8; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .rx-progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .rx-meta { font-size: 0.9rem; color: #555; margin-bottom: 4px; }
    .rx-date-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin-top: 10px; }
    .rx-return-box { background-color: #f8f9fa; padding: 8px 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin-top: 12px; }
    .med-item { display: flex; align-items: flex-start; border-bottom: 1px dashed #eee; padding-bottom: 12px; margin-bottom: 12px; }
    .med-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .med-num { background-color: #20935A; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; margin-right: 12px; flex-shrink: 0; }
    .med-info { flex-grow: 1; }
    .med-name { font-weight: bold; font-size: 0.95rem; color: #333; margin-bottom: 6px; }
    .med-tags { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
    .tag-box { border: 1px solid #ddd; border-radius: 4px; padding: 2px 6px; color: #666; margin-right: 5px; }
    .rx-body-collapse { display: none; padding: 15px; }
    .rx-body-collapse.open { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<div id="loading"><div class="spinner-border text-success" role="status"></div><p class="mt-3 text-secondary fw-bold" id="loadingText">系統連線中...</p></div>

<div class="container"> 
  <div id="view-home">
    <div class="brand-header"><h1 class="brand-title">樂森藥局</h1><p class="brand-subtitle">Lawson Pharmacy Cloud</p></div>
    <div class="home-content">
      <div class="home-content-wrapper">
        <div class="user-card hidden-mode" id="userInfo">
          <div class="d-flex align-items-center">
            <img id="userThumb" src="https://placehold.co/50" class="user-avatar">
            <div class="ms-2">
              <div class="small text-muted">LINE 帳號</div>
              <div class="fw-bold text-dark" id="userNameDisplay">訪客</div>
            </div>
          </div>
          <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="doLiffLogout()">登出</button>
        </div>
        <div class="home-btn-group">
          <button class="menu-btn main-btn" onclick="openUpload()"><img src="5.png" class="menu-banner" alt="處方上傳" onerror="this.style.display='none'"><span class="main-btn-text">處方上傳 / Line綁定領藥通知</span></button>
          <button class="menu-btn" onclick="openStatus()"><img src="3.png" class="menu-icon" alt="狀態查詢" onerror="this.style.display='none'"><span>領藥狀態查詢</span></button>
          <button class="menu-btn" onclick="openMedHistory()"><img src="4.png" class="menu-icon" alt="雲端藥歷" onerror="this.style.display='none'"><span>雲端藥歷查詢</span></button>
        </div>
      </div>
    </div>
  </div>

  <div id="view-form" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0 bg-light">
      <h5 class="fw-bold text-success mb-2"><i class="bi bi-person-lines-fill"></i> 建立領藥檔案</h5>
      <p class="small text-muted mb-3">若您有多張實體處方箋，可以連續拍照上傳。若僅需綁定 LINE，請直接跳過拍照填寫資料送出即可！</p>
      <div id="cameraSection">
        <div class="row g-2 mb-2" id="previewGrid"></div>
        <div class="preview-box shadow-sm" onclick="document.getElementById('fileInput').click()" id="uploadBtnBox">
          <div class="placeholder-text" id="placeholder"><span style="font-size: 2rem;">📷</span><br>點此拍照 / 選照片<br><span class="small fw-normal text-muted">(無處方箋可略過)</span></div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(this)">
      </div>
      <div class="mb-3 mt-2"><label class="form-label small fw-bold">領藥人姓名</label><input type="text" class="form-control" id="uName" placeholder="請輸入姓名"></div>
      <div class="mb-3"><label class="form-label small fw-bold">聯絡電話</label><input type="tel" class="form-control" id="uPhone" placeholder="請輸入手機號碼"></div>
      <div class="form-check mb-4"><input class="form-check-input" type="checkbox" id="privacyConsentUpload"><label class="form-check-label text-muted small" for="privacyConsentUpload">我已同意隱私權保護與服務條款，並授權藥局建檔通知。</label></div>
      <button class="btn btn-success w-100 fw-bold py-2 shadow-sm fs-5" onclick="submitData()">確認送出資料</button>
    </div>
  </div>

  <div id="view-status" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0">
      <h5 class="fw-bold text-info mb-3"><i class="bi bi-card-checklist"></i> 領藥狀態查詢</h5>
      <div id="uploadHistoryList"></div>
    </div>
  </div>

  <div id="view-meds" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div id="medQueryForm">
      <div class="card p-4 shadow-sm border-0 bg-light">
        <h5 class="fw-bold text-dark mb-3"><i class="bi bi-cloud-arrow-up"></i> 雲端藥歷查詢</h5>
        <p class="small text-muted mb-4">請輸入【領藥人姓名】與【身分證字號】進行安全驗證。</p>
        <div class="mb-3"><label class="form-label small fw-bold text-primary">領藥人姓名</label><input type="text" class="form-control" id="qName" placeholder="請輸入姓名"></div>
        <div class="mb-4"><label class="form-label small fw-bold text-danger">身分證字號</label><input type="text" class="form-control text-uppercase" id="qId" placeholder="例如：A123456789"></div>
        <button class="btn btn-dark w-100 fw-bold py-2 mb-2 shadow-sm" onclick="queryMedHistory()"><i class="bi bi-search"></i> 安全查詢</button>
      </div>
    </div>
    <div id="medHistoryResult"></div>
  </div>

  <div id="view-success" class="hidden-mode sub-view d-flex flex-column justify-content-center align-items-center text-center">
    <i class="bi bi-check-circle-fill text-success mb-3" style="font-size: 5rem;"></i>
    <h3 class="fw-bold text-dark">授權成功</h3>
    <p class="text-muted mb-5">請告知櫃台藥師您的姓名以完成建檔。</p>
    <button class="btn btn-success btn-lg rounded-pill px-5 fw-bold shadow-sm" onclick="closeLiffWindow()">關閉視窗</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ⚠️ 請務必確認此處為您最新的 Google Apps Script 發佈網址
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyUXCejmkI52ZJVUN1K1t1j2ZvfdZMCgHsgB79okITgzn7to2sfte43R5I0GOQnFp1opQ/exec";
  const LIFF_ID = "2008912977-DuJTm5u1"; 

  let lineUserId = "", lineDisplayName = "", linePictureUrl = "";
  let uploadedImages = []; 
  
  const NHI_DEPT_MAP = {
    "00":"不分科","01":"家醫科","02":"內科","03":"外科","04":"小兒科","05":"婦產科",
    "06":"骨科","07":"泌尿科","08":"耳鼻喉科","09":"眼科","10":"皮膚科","11":"神經科",
    "12":"精神科","13":"復健科","14":"整形外科","15":"職業醫學科","22":"急診醫學科",
    "23":"牙醫一般科","39":"牙醫一般科","40":"牙醫一般科","60":"中醫科","81":"麻醉科"
  };

  // 🔥 關鍵修復：在前台定義 translateDept 函數
  function translateDept(codeStr) {
    if (!codeStr) return "一般科";
    let c = String(codeStr).trim().toUpperCase();
    let num = parseInt(c, 10);
    if (!isNaN(num) && num.toString() === c.replace(/^0+/, '')) { c = num < 10 ? "0" + num : String(num); }
    return NHI_DEPT_MAP[c] ? NHI_DEPT_MAP[c] : c; 
  }

  function sendToGAS(payload, timeout = 20000) {
      return new Promise((resolve, reject) => {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => { controller.abort(); reject(new Error("timeout")); }, timeout);
          fetch(GAS_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload),
              redirect: 'follow',
              signal: controller.signal
          })
          .then(response => response.json())
          .then(data => { clearTimeout(timeoutId); resolve(data); })
          .catch(err => { clearTimeout(timeoutId); reject(err); });
      });
  }

  window.onload = function() { initLiff(); };
  
  function initLiff() {
    liff.init({ liffId: LIFF_ID }).then(() => {
      document.getElementById('loading').style.display = 'none';
      if (liff.isLoggedIn()) {
        liff.getProfile().then(profile => {
          lineUserId = profile.userId; lineDisplayName = profile.displayName; linePictureUrl = profile.pictureUrl || "";
          document.getElementById('userNameDisplay').innerText = lineDisplayName;
          document.getElementById('uName').value = lineDisplayName; 
          if(profile.pictureUrl) document.getElementById('userThumb').src = profile.pictureUrl;
          document.getElementById('userInfo').classList.remove('hidden-mode');
          
          const urlParams = new URLSearchParams(window.location.search);
          const mode = urlParams.get('mode');
          if (mode === 'quickbind') doQuickBind();
          else if (mode === 'upload') openUpload();
          else if (mode === 'status') openStatus();
          else if (mode === 'meds') openMedHistory();
          else goHome(); 
        });
      } else { liff.login(); }
    }).catch(err => { alert("LINE 初始化失敗"); });
  }

  function doQuickBind() {
    document.getElementById('loading').style.display = 'flex';
    sendToGAS({ action: "upload", name: lineDisplayName, lineUserId: lineUserId, isRegister: true, dept: "快速綁定", notify: "LINE通知" })
    .then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success' || res.status === 'duplicate') {
        document.getElementById('view-home').classList.add('hidden-mode');
        document.getElementById('view-success').classList.remove('hidden-mode');
      } else { alert("❌ 失敗：" + res.message); goHome(); }
    }).catch(() => { document.getElementById('loading').style.display = 'none'; alert("連線超時"); goHome(); });
  }

  function closeLiffWindow() { liff.closeWindow(); }
  function goHome() { 
    document.getElementById('view-home').classList.remove('hidden-mode');
    document.getElementById('view-form').classList.add('hidden-mode');
    document.getElementById('view-status').classList.add('hidden-mode');
    document.getElementById('view-meds').classList.add('hidden-mode');
    document.getElementById('view-success').classList.add('hidden-mode');
  }

  function openUpload() { goHome(); document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-form').classList.remove('hidden-mode'); }
  function openStatus() { goHome(); document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-status').classList.remove('hidden-mode'); fetchUploadHistory(); }
  function openMedHistory() { goHome(); document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-meds').classList.remove('hidden-mode'); resetMedQuery(); }

  function fetchUploadHistory() {
    document.getElementById('uploadHistoryList').innerHTML = '<div class="text-center py-4">讀取中...</div>';
    sendToGAS({ action: "history", lineUserId: lineUserId })
    .then(res => {
      const container = document.getElementById('uploadHistoryList'); container.innerHTML = '';
      if (!res.history || res.history.length === 0) { container.innerHTML = '<p class="text-center py-4 text-muted">尚無紀錄</p>'; return; }
      res.history.forEach(item => {
        let statusColor = item.status === '已收單處理' ? 'bg-success' : 'bg-warning text-dark';
        container.innerHTML += `<div class="card p-2 mb-2 shadow-sm border-0 flex-row align-items-center bg-light">
          <img src="${item.img}" style="width:50px;height:50px;object-fit:cover;border-radius:5px;margin-right:10px;">
          <div class="flex-grow-1"><div class="fw-bold small">${item.date}</div><div class="text-muted small">${item.dept}</div></div>
          <span class="badge ${statusColor} small">${item.status}</span>
        </div>`;
      });
    }).catch(() => { document.getElementById('uploadHistoryList').innerHTML = '連線失敗'; });
  }

  function _parseDate(dStr) {
      if(!dStr) return null;
      let s = dStr.replace(/-/g, '/');
      let parts = s.split('/');
      if(parts.length === 3) { let y = parseInt(parts[0]); if(y < 200) y += 1911; return new Date(y, parseInt(parts[1])-1, parseInt(parts[2])); } 
      return new Date(s);
  }
  function _addDays(date, days) { let result = new Date(date); result.setDate(result.getDate() + days); return result; }
  function _fmt(date, format) { if(!date || isNaN(date.getTime())) return '-'; let y = date.getFullYear(); let m = String(date.getMonth() + 1).padStart(2, '0'); let d = String(date.getDate()).padStart(2, '0'); return format === 'MM/DD' ? m + '/' + d : y + '-' + m + '-' + d; }

  function queryMedHistory() {
    const name = document.getElementById('qName').value.trim();
    const id = document.getElementById('qId').value.trim().toUpperCase();
    if (!name || !id) return alert("請填寫姓名與身分證");
    document.getElementById('loading').style.display = 'flex';
    const resultDiv = document.getElementById('medHistoryResult');
    sendToGAS({ action: "queryMed", name: name, id: id })
    .then(res => {
      document.getElementById('loading').style.display = 'none';
      if (res.status === 'success' && res.data.length > 0) {
        document.getElementById('medQueryForm').style.display = 'none';
        const grouped = {};
        res.data.forEach(item => {
          let key = (item.rxDate || item.date.split(' ')[0]) + '_' + (item.hospital || '院所');
          if (!grouped[key]) grouped[key] = { rxDateStr: item.rxDate || item.date.split(' ')[0], hospital: item.hospital || '未載明', dept: item.dept, days: parseInt(item.days)||28, totalRefills: 1, maxCurrentRefill: 1, items: [] };
          let refillParts = item.refill ? item.refill.split('/') : [1,1];
          if (parseInt(refillParts[0]) > grouped[key].maxCurrentRefill) grouped[key].maxCurrentRefill = parseInt(refillParts[0]);
          if (parseInt(refillParts[1]) > grouped[key].totalRefills) grouped[key].totalRefills = parseInt(refillParts[1]);
          grouped[key].items.push(item);
        });
        let html = `<div class="d-flex justify-content-between mb-3"><b>${name} 的用藥紀錄</b><button class="btn btn-sm btn-outline-secondary" onclick="resetMedQuery()">重查</button></div>`;
        Object.keys(grouped).forEach(k => {
          let m = grouped[k]; let rxDate = _parseDate(m.rxDateStr);
          let d2 = rxDate ? _fmt(_addDays(rxDate, m.days), 'MM/DD') : '-';
          let d3 = rxDate ? _fmt(_addDays(rxDate, m.days*2), 'MM/DD') : '-';
          let retD = rxDate ? _fmt(_addDays(rxDate, m.days*m.totalRefills), 'YYYY-MM-DD') : '-';
          html += `<div class="rx-card shadow-sm">
            <div class="rx-header" onclick="this.nextElementSibling.classList.toggle('open')"><span>${m.rxDateStr} - ${translateDept(m.dept)}</span><i class="bi bi-chevron-down"></i></div>
            <div class="rx-body-collapse open">
              <div class="rx-progress-box">
                <div class="small">🏥 ${m.hospital} | 進度: ${m.maxCurrentRefill}/${m.totalRefills}</div>
                <div class="rx-date-row"><span>第二次領藥：</span><b class="text-danger">${d2}</b></div>
                <div class="rx-date-row"><span>第三次領藥：</span><b class="text-danger">${d3}</b></div>
                <div class="rx-return-box"><span>預約回診日：</span><b class="text-danger">${retD}</b></div>
              </div>
              <div class="med-list small">` + m.items.map(i => `<div>• ${i.drug} (${i.total})</div>`).join('') + `</div>
            </div>
          </div>`;
        });
        resultDiv.innerHTML = html;
      } else { alert("查無資料"); }
    }).catch(() => { document.getElementById('loading').style.display = 'none'; alert("查詢失敗"); });
  }

  function resetMedQuery() { document.getElementById('medQueryForm').style.display = 'block'; document.getElementById('medHistoryResult').innerHTML = ''; }

  function handleFile(input) {
    if (input.files && input.files[0]) {
      const file = input.files[0];
      document.getElementById('loading').style.display = 'flex';
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image(); img.src = e.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height; if(w > 1200) { h *= 1200/w; w = 1200; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          uploadedImages.push({ base64: canvas.toDataURL('image/jpeg', 0.8), fileName: file.name });
          renderPreviews(); document.getElementById('loading').style.display = 'none';
        }
      };
      reader.readAsDataURL(file);
    }
  }

  function renderPreviews() {
    const grid = document.getElementById('previewGrid'); grid.innerHTML = '';
    uploadedImages.forEach((img, i) => {
      grid.innerHTML += `<div class="col-4"><div class="thumb-wrap"><img src="${img.base64}"><button class="thumb-remove" onclick="uploadedImages.splice(${i},1);renderPreviews();">×</button></div></div>`;
    });
  }

  function submitData() {
    const name = document.getElementById('uName').value.trim();
    const phone = document.getElementById('uPhone').value.trim();
    if (!name || phone.length < 9) return alert("請填寫正確資料");
    if (!document.getElementById('privacyConsentUpload').checked) return alert("請同意條款");
    document.getElementById('loading').style.display = 'flex';
    sendToGAS({ action: "upload", name: name, phone: phone, lineUserId: lineUserId, fileDataArray: uploadedImages.map(i=>i.base64), isRegister: false, dept: "一般", notify: "LINE通知" })
    .then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success') { alert("上傳成功"); goHome(); } else { alert(res.message); }
    }).catch(() => { document.getElementById('loading').style.display = 'none'; alert("連線失敗"); });
  }
</script>
</body>
</html>
