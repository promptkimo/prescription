<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>樂森藥局 雲服務</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    /* ... 保持原本的 CSS 完全不變，加上一個新的 meta-box 樣式 ... */
    body { background-color: #f0f2f5; font-family: -apple-system, sans-serif; padding-bottom: 30px; margin: 0; }
    .container { max-width: 600px; padding: 0; }
    .card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .user-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .user-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid #06C755; }
    .preview-box { width: 100%; height: 200px; background: #e9ecef; border: 2px dashed #ced4da; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; margin-bottom: 15px; }
    .preview-box img { width: 100%; height: 100%; object-fit: contain; display: none; }
    .placeholder-text { color: #6c757d; text-align: center; font-size: 0.9rem; }
    .hidden-mode { display: none !important; } 
    .brand-header { background: linear-gradient(135deg, #06C755 0%, #009933 100%); padding: 45px 20px 35px; border-radius: 0 0 25px 25px; text-align: center; margin-bottom: 20px; color: white; box-shadow: 0 4px 15px rgba(6, 199, 85, 0.2); }
    .brand-title { font-weight: 900; font-size: 2rem; letter-spacing: 2px; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.15); } 
    .brand-subtitle { font-size: 0.95rem; opacity: 0.9; margin-bottom: 0; font-weight: 500; letter-spacing: 1px; }
    .padded-view { padding: 15px 15px 0 15px; }
    .back-btn-container { margin-bottom: 15px; }
    .back-btn { font-size: 1rem; font-weight: bold; color: #495057; padding: 8px 18px; background: white; border-radius: 50px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: inline-flex; align-items: center; border: none; transition: 0.2s; }
    .back-btn:active { transform: scale(0.95); background: #f8f9fa; }
    .back-btn i { font-size: 1.2rem; margin-right: 5px; color: #06C755; }
    .menu-btn { padding: 20px; border-radius: 16px; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; transition: 0.2s; border: 2px solid; }
    .menu-btn i { font-size: 2rem; margin-bottom: 8px; }
    .menu-btn:active { transform: scale(0.97); }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .accordion-item { border: none; border-radius: 12px !important; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; }
    .accordion-button { font-weight: bold; color: #0f5132; background-color: #f8fff9; padding: 15px; border-radius: 12px !important; flex-direction: column; align-items: flex-start; }
    .accordion-button::after { position: absolute; right: 15px; top: 25px; }
    .accordion-button:not(.collapsed) { background-color: #e8f5e9; color: #0f5132; box-shadow: none; border-bottom-left-radius: 0 !important; border-bottom-right-radius: 0 !important; }
    .med-table th { font-weight: 600; background-color: #f8f9fa; white-space: nowrap; }
    .med-table td { vertical-align: middle; }
    .nhi-col { font-family: monospace; color: #6c757d; white-space: nowrap; }
    .drug-col { font-weight: bold; color: #333; min-width: 120px; }
    .num-col { white-space: nowrap; text-align: center; }
    
    /* 🔥 新增：處方回診資訊小卡 */
    .meta-box { background: rgba(6, 199, 85, 0.1); padding: 8px 12px; border-radius: 8px; margin-top: 8px; width: 90%; border: 1px solid rgba(6, 199, 85, 0.2); }
    .meta-item { font-size: 0.85rem; color: #0f5132; font-weight: normal; margin-bottom: 3px; display: flex; align-items: center; }
    .meta-item i { margin-right: 6px; font-size: 0.95rem; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner-border text-success"></div><p class="mt-3 text-secondary fw-bold" id="loadingText">系統連線中...</p></div>

<div class="container"> 
  <div id="view-home">
    <div class="brand-header"><h1 class="brand-title">樂森藥局</h1><p class="brand-subtitle">LISEN PHARMACY CLOUD</p></div>
    <div class="px-3">
      <div class="user-card d-flex justify-content-between align-items-center hidden-mode" id="userInfo">
        <div class="d-flex align-items-center"><img id="userThumb" src="https://placehold.co/50" class="user-avatar"><div><div class="small text-muted">目前登入帳號</div><div class="fw-bold text-dark" id="userNameDisplay">訪客</div></div></div>
        <button class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-bold" onclick="doLiffLogout()">登出</button>
      </div>
      <div class="d-grid gap-3">
        <button class="btn btn-outline-success menu-btn" onclick="openUpload()"><i class="bi bi-camera"></i><span>1. 上傳處方箋</span></button>
        <button class="btn btn-outline-primary menu-btn" onclick="openBindLine()"><i class="bi bi-link-45deg"></i><span>2. LINE 綁定通知領藥</span></button>
        <button class="btn btn-outline-secondary menu-btn" onclick="openHistory()"><i class="bi bi-cloud-arrow-up"></i><span>3. 雲端藥歷查詢</span></button>
      </div>
    </div>
  </div>

  <div id="view-form" class="hidden-mode padded-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0"><h5 class="fw-bold text-success mb-3"><i class="bi bi-camera"></i> 上傳處方箋</h5><div class="mb-3"><label class="form-label small fw-bold">領藥人姓名</label><input type="text" class="form-control" id="uName"></div><div class="mb-3"><label class="form-label small fw-bold">聯絡電話</label><input type="tel" class="form-control" id="uPhone"></div><button class="btn btn-success w-100 fw-bold py-2" onclick="submitData()">確認上傳</button></div>
  </div>

  <div id="view-bind" class="hidden-mode padded-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0 border-top border-primary border-4"><h5 class="fw-bold text-primary mb-3"><i class="bi bi-link-45deg"></i> LINE 綁定作業</h5><div class="mb-3"><label class="form-label small fw-bold text-primary">真實姓名</label><input type="text" class="form-control" id="bName"></div><div class="mb-4"><label class="form-label small fw-bold text-primary">聯絡電話</label><input type="tel" class="form-control" id="bPhone"></div><button class="btn btn-primary w-100 fw-bold py-2" onclick="submitBind()">🔗 確認綁定</button></div>
  </div>

  <div id="view-history" class="hidden-mode padded-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0" id="authSection"><h5 class="fw-bold text-secondary mb-3"><i class="bi bi-shield-lock"></i> 安全藥歷查詢</h5><div class="mb-3"><label class="form-label small fw-bold">病人姓名</label><input type="text" class="form-control" id="qName"></div><div class="mb-4"><label class="form-label small fw-bold">身分證字號</label><input type="text" class="form-control" id="qId"></div><button class="btn btn-secondary w-100 fw-bold py-2" onclick="queryMedData()">驗證並查詢</button></div>
    <div id="resultSection" class="hidden-mode"><div class="d-flex justify-content-between align-items-center mb-3 px-1"><h6 class="fw-bold text-success mb-0" id="resultTitle">查無資料</h6><button class="btn btn-sm btn-outline-secondary" onclick="resetQuery()">重新查詢</button></div><div class="accordion pb-4" id="medAccordion"></div></div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyUXCejmkI52ZJVUN1K1t1j2ZvfdZMCgHsgB79okITgzn7to2sfte43R5I0GOQnFp1opQ/exec"; 
  const LIFF_ID = "2008912977-DuJTm5u1"; 
  let lineUserId = "", lineDisplayName = "";

  window.onload = function() { initLiff(); };
  function initLiff() { /* 省略與上一版相同的導航邏輯 */ liff.init({liffId: LIFF_ID}).then(()=>{document.getElementById('loading').style.display='none';}); }
  function goHome() { document.getElementById('view-home').classList.remove('hidden-mode'); document.getElementById('view-form').classList.add('hidden-mode'); document.getElementById('view-bind').classList.add('hidden-mode'); document.getElementById('view-history').classList.add('hidden-mode'); }
  function openHistory() { goHome(); document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-history').classList.remove('hidden-mode'); }
  function resetQuery() { document.getElementById('qId').value = ""; document.getElementById('authSection').classList.remove('hidden-mode'); document.getElementById('resultSection').classList.add('hidden-mode'); document.getElementById('medAccordion').innerHTML = ""; }

  function queryMedData() {
    const qName = document.getElementById('qName').value.trim(); const qId = document.getElementById('qId').value.trim();
    if(!qName || !qId) return alert("請輸入完整姓名與身分證");
    document.getElementById('loading').style.display = 'flex'; document.getElementById('loadingText').innerText = "雲端檢索中...";
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "queryMed", name: qName, id: qId }) })
    .then(res => res.json()).then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success') {
        document.getElementById('authSection').classList.add('hidden-mode'); document.getElementById('resultSection').classList.remove('hidden-mode');
        renderMedListGrouped(qName, res.data); 
      } else alert("查詢失敗");
    });
  }

  // 🔥 核心更新：智慧渲染處方回診資訊
  function renderMedListGrouped(patientName, data) {
    const container = document.getElementById('medAccordion'); container.innerHTML = "";
    if(!data || data.length === 0) { document.getElementById('resultTitle').innerText = `${patientName} 的藥歷`; container.innerHTML = `<div class="text-center py-5 text-muted">查無用藥紀錄</div>`; return; }
    document.getElementById('resultTitle').innerText = `${patientName} 的藥歷`;

    const groupedData = {};
    data.forEach(item => {
      const dateKey = item.date ? item.date : '未知日期';
      if (!groupedData[dateKey]) groupedData[dateKey] = [];
      groupedData[dateKey].push(item);
    });

    const dates = Object.keys(groupedData).sort((a, b) => new Date(b) - new Date(a));

    dates.forEach((date, index) => {
      const drugs = groupedData[date];
      const isFirst = index === 0;
      const collapseClass = isFirst ? "show" : "";
      const buttonClass = isFirst ? "" : "collapsed";

      // 取得該日期的第一筆處方資料
      const meta = drugs[0];
      let metaHtml = "";
      
      // 🔥 如果有科別或預估日期，就顯示精美資訊卡
      if (meta.dept || meta.nextDate) {
        let refillText = meta.refill ? ` (第 ${meta.refill} 次)` : "";
        let nextLabel = "下回可領藥日";
        
        // 智慧判斷：如果第 3/3 次，下回就是回診
        if (meta.refill) {
           let parts = meta.refill.split('/');
           if (parts.length === 2 && parts[0] === parts[1]) nextLabel = "🏥 預估回診日";
           else nextLabel = "💊 下回領藥日";
        }

        metaHtml = `
          <div class="meta-box">
            <div class="meta-item"><i class="bi bi-hospital"></i> 處方科別：${meta.dept || '未記錄'}${refillText}</div>
            ${meta.nextDate ? `<div class="meta-item fw-bold text-danger"><i class="bi bi-calendar-heart"></i> ${nextLabel}：${meta.nextDate}</div>` : ''}
          </div>
        `;
      }

      let tableHtml = `<div class="table-responsive"><table class="table table-sm table-striped table-hover med-table mb-0" style="font-size: 0.85rem;"><thead><tr><th>健保碼</th><th>藥品名稱</th><th class="text-center">用量</th><th class="text-center">天數</th><th class="text-center">總量</th></tr></thead><tbody>`;
      drugs.forEach(drug => { tableHtml += `<tr><td class="nhi-col">${drug.nhi}</td><td class="drug-col">${drug.drug}</td><td class="num-col">${drug.dosage}</td><td class="num-col">${drug.days}</td><td class="num-col text-success fw-bold">${drug.total}</td></tr>`; });
      tableHtml += `</tbody></table></div>`;

      const accordionItem = `
        <div class="accordion-item bg-white">
          <h2 class="accordion-header" id="heading-${index}">
            <button class="accordion-button ${buttonClass}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-${index}">
              <div class="d-flex align-items-center w-100 mb-1">
                <i class="bi bi-calendar-check me-2 fs-5"></i> 
                <span class="fs-5">${date}</span> &nbsp; 
                <span class="badge bg-success rounded-pill ms-2">${drugs.length} 項藥品</span>
              </div>
              ${metaHtml} </button>
          </h2>
          <div id="collapse-${index}" class="accordion-collapse collapse ${collapseClass}" data-bs-parent="#medAccordion"><div class="accordion-body p-0">${tableHtml}</div></div>
        </div>
      `;
      container.innerHTML += accordionItem;
    });
  }
</script>
</body>
</html>
