<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>樂森藥局 雲服務</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    body { background-color: #f0f2f5; font-family: -apple-system, sans-serif; margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }
    .container { max-width: 600px; padding: 0; flex-grow: 1; display: flex; flex-direction: column; margin: 0 auto; width: 100%; }
    
    .card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .user-card { background: white; padding: 12px 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex-shrink: 0; }
    .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid #06C755; }
    
    .preview-box { width: 100%; height: 200px; background: #e9ecef; border: 2px dashed #ced4da; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; margin-bottom: 15px; }
    .preview-box img { width: 100%; height: 100%; object-fit: contain; display: none; }
    .placeholder-text { color: #6c757d; text-align: center; font-size: 0.9rem; }
    
    .hidden-mode { display: none !important; } 

    #view-home { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    
    .brand-header { background: linear-gradient(135deg, #06C755 0%, #009933 100%); padding: 30px 20px 20px; border-radius: 0 0 20px 20px; text-align: center; margin-bottom: 15px; color: white; box-shadow: 0 4px 10px rgba(6, 199, 85, 0.15); flex-shrink: 0; }
    .brand-title { font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.15); } 
    .brand-subtitle { font-size: 0.9rem; opacity: 0.9; margin-bottom: 0; font-weight: 500; letter-spacing: 1px; }

    .home-content { display: flex; flex-direction: column; flex-grow: 1; padding: 0 15px 20px 15px; min-height: 0; }
    .home-btn-group { display: flex; flex-direction: column; flex-grow: 1; gap: 10px; }
    
    .menu-btn { flex-grow: 1; border-radius: 14px; font-weight: bold; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; transition: 0.2s; border: 2px solid; padding: 5px; min-height: 60px; }
    .menu-btn i { font-size: 1.6rem; margin-bottom: 4px; }
    .menu-btn:active:not(:disabled) { transform: scale(0.97); }

    .sub-view { flex-grow: 1; padding: 15px 15px 30px 15px; overflow-y: auto; }

    .back-btn-container { margin-bottom: 15px; }
    .back-btn { font-size: 1rem; font-weight: bold; color: #495057; padding: 8px 18px; background: white; border-radius: 50px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: inline-flex; align-items: center; border: none; transition: 0.2s; }
    .back-btn:active { transform: scale(0.95); background: #f8f9fa; }
    .back-btn i { font-size: 1.2rem; margin-right: 5px; color: #06C755; }

    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner-border text-success" role="status"></div><p class="mt-3 text-secondary fw-bold" id="loadingText">系統連線中...</p></div>

<div class="container"> 
  <div id="view-home">
    <div class="brand-header"><h1 class="brand-title">樂森藥局</h1><p class="brand-subtitle">Lawson Pharmacy Cloud</p></div>
    <div class="home-content">
      <div class="user-card d-flex justify-content-between align-items-center hidden-mode" id="userInfo">
        <div class="d-flex align-items-center"><img id="userThumb" src="https://placehold.co/50" class="user-avatar"><div><div class="small text-muted" style="font-size:0.75rem;">目前登入帳號</div><div class="fw-bold text-dark" id="userNameDisplay" style="font-size:0.95rem;">訪客</div></div></div>
        <button class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-bold" onclick="doLiffLogout()">登出</button>
      </div>
      <div class="home-btn-group">
        <button class="btn btn-outline-success menu-btn" onclick="openUpload()"><i class="bi bi-camera"></i><span>1. 上傳處方箋</span></button>
        <button class="btn btn-outline-primary menu-btn" onclick="openBindLine()"><i class="bi bi-link-45deg"></i><span>2. LINE 綁定通知領藥</span></button>
        <button class="btn btn-outline-info menu-btn" onclick="openStatus()"><i class="bi bi-card-checklist"></i><span>3. 查看處方狀態</span></button>
        <button class="btn btn-outline-dark menu-btn" onclick="openMedHistory()"><i class="bi bi-cloud-arrow-up"></i><span>4. 雲端藥歷查詢</span></button>
      </div>
    </div>
  </div>

  <div id="view-form" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0">
      <h5 class="fw-bold text-success mb-3" id="formTitle"><i class="bi bi-camera"></i> 上傳處方箋</h5>
      <div id="btnOptionalLogin" class="alert alert-warning small d-flex justify-content-between align-items-center hidden-mode p-2 mb-3"><span class="fw-bold text-dark">未綁定 LINE (僅選電話通知)</span><button class="btn btn-sm btn-success fw-bold rounded-pill px-3" onclick="doOptionalLogin()">登入 LINE</button></div>
      <div id="cameraSection"><div class="preview-box" onclick="document.getElementById('fileInput').click()"><div class="placeholder-text" id="placeholder"><span style="font-size: 2rem;">📷</span><br>點此拍照 / 選照片</div><img id="previewImg"></div><input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(this)"></div>
      <div class="mb-3"><label class="form-label small fw-bold">領藥人姓名 (病人)</label><input type="text" class="form-control" id="uName"></div>
      <div class="mb-3"><label class="form-label small fw-bold">聯絡電話</label><input type="tel" class="form-control" id="uPhone" placeholder="請輸入聯絡電話"></div>
      <div class="mb-3" id="deptSection"><label class="form-label small fw-bold">科別 (選填)</label><input type="text" class="form-control" id="uDept" placeholder="例如：牙科、內科..."></div>
      <div class="mb-4" id="notifySection"><label class="form-label small fw-bold">希望通知方式</label><select class="form-select" id="uNotify"><option value="LINE通知" id="optLine" selected>LINE 通知 (推薦)</option><option value="電話通知" id="optPhone">電話通知</option></select></div>
      <button class="btn btn-success w-100 fw-bold py-2" onclick="submitData()">確認上傳</button>
    </div>
  </div>

  <div id="view-bind" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0 border-top border-primary border-4">
      <h5 class="fw-bold text-primary mb-3"><i class="bi bi-link-45deg"></i> LINE 綁定作業</h5>
      <p class="small text-muted mb-4">請填寫您的真實資料。綁定完成後，藥師就能直接透過 LINE 通知您來拿藥！</p>
      <div class="mb-3"><label class="form-label small fw-bold text-primary">您的真實姓名</label><input type="text" class="form-control" id="bName" placeholder="請輸入姓名"></div>
      <div class="mb-4"><label class="form-label small fw-bold text-primary">聯絡電話</label><input type="tel" class="form-control" id="bPhone" placeholder="請輸入手機號碼"></div>
      <button class="btn btn-primary w-100 fw-bold py-2" onclick="submitBind()">🔗 確認綁定 LINE</button>
    </div>
  </div>

  <div id="view-status" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0">
      <h5 class="fw-bold text-info mb-3"><i class="bi bi-card-checklist"></i> 處方狀態查詢</h5>
      <p class="small text-muted mb-3">以下是您曾經上傳過的處方箋紀錄與目前處理進度：</p>
      <div id="uploadHistoryList"></div>
    </div>
  </div>

  <div id="view-meds" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0 border-top border-dark border-4">
      <h5 class="fw-bold text-dark mb-3"><i class="bi bi-cloud-arrow-up"></i> 雲端藥歷查詢</h5>
      <p class="small text-muted mb-4">為保護個人隱私，請輸入【領藥人姓名】與【身分證字號】進行安全驗證，以查詢詳細用藥紀錄。</p>
      
      <div class="mb-3">
        <label class="form-label small fw-bold text-primary">領藥人真實姓名</label>
        <input type="text" class="form-control" id="qName" placeholder="請輸入領藥人的姓名">
      </div>
      <div class="mb-4">
        <label class="form-label small fw-bold text-danger">領藥人身分證字號</label>
        <input type="text" class="form-control text-uppercase" id="qId" placeholder="例如：A123456789">
      </div>
      <button class="btn btn-dark w-100 fw-bold py-2 mb-4 shadow-sm" onclick="queryMedHistory()"><i class="bi bi-search"></i> 安全查詢</button>

      <div id="medHistoryResult"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyUXCejmkI52ZJVUN1K1t1j2ZvfdZMCgHsgB79okITgzn7to2sfte43R5I0GOQnFp1opQ/exec"; 
  const LIFF_ID = "2008912977-DuJTm5u1"; 

  const NHI_DEPT_MAP = {
    "00": "不分科", "01": "家醫科", "02": "內科", "03": "外科", "04": "兒科", "05": "婦產科", 
    "06": "骨科", "07": "神經外科", "08": "泌尿科", "09": "耳鼻喉科", "10": "眼科", "11": "皮膚科", 
    "12": "神經科", "13": "精神科", "14": "復健科", "15": "整形外科", "22": "急診醫學科", 
    "23": "職業醫學科", "2A": "結核科", "2B": "洗腎科", "39": "牙醫一般科", "40": "牙科", 
    "60": "中醫一般科", "81": "麻醉科", "82": "放射線科", "83": "病理科", "84": "核子醫學科",
    "AA": "消化內科", "AB": "心臟血管內科", "AC": "胸腔內科", "AD": "腎臟內科", "AE": "風濕科", 
    "AF": "血液科", "AG": "內分泌科", "AH": "感染科", "AI": "免疫科", "AJ": "胃腸內科", 
    "AK": "腫瘤內科", "AL": "老年醫學科", "AM": "新陳代謝科", "AN": "肝膽胃腸科",
    "BA": "一般外科", "BB": "小兒外科", "BC": "大腸直腸外科", "BD": "心臟血管外科", "BE": "胸腔外科", "BF": "消化外科", "BG": "腦神經外科",
    "CA": "一般兒科", "CB": "小兒神經科", "CC": "小兒心臟科", "CD": "小兒胸腔科", "CE": "小兒腎臟科", "CF": "小兒血液科", 
    "CG": "小兒內分泌科", "CH": "小兒過敏科", "CI": "小兒感染科", "CJ": "小兒胃腸科", "CK": "小兒風濕科", "CL": "小兒免疫科",
    "DA": "一般牙科", "DB": "牙髓病科", "DC": "牙周病科", "DD": "補綴科", "DE": "齒顎矯正科", "DF": "兒童牙科", "DG": "口腔顎面外科",
    "EA": "中醫內科", "EB": "中醫外科", "EC": "中醫兒科", "ED": "中醫婦科", "EE": "中醫傷科", "EF": "中醫針灸科",
    "FA": "放射診斷科", "FB": "放射治療科", "FC": "放射線腫瘤科", "FD": "臨床病理科", "FE": "解剖病理科",
    "1": "家醫科", "2": "內科", "3": "外科", "4": "兒科", "5": "婦產科", "6": "骨科", 
    "7": "神經外科", "8": "泌尿科", "9": "耳鼻喉科"
  };

  function translateDept(codeStr) {
      if (!codeStr) return "一般領藥";
      let c = String(codeStr).trim().toUpperCase();
      if (c.length === 1 && !isNaN(c)) c = "0" + c;
      return NHI_DEPT_MAP[c] ? NHI_DEPT_MAP[c] : c; 
  }

  let lineUserId = "", lineDisplayName = "", linePictureUrl = "", base64Image = "", fileName = "", isRegisterMode = false;
  const urlParams = new URLSearchParams(window.location.search);
  const currentMode = urlParams.get('mode');

  window.onload = function() { initLiff(); };

  function initLiff() {
    liff.init({ liffId: LIFF_ID }).then(() => {
      document.getElementById('loading').style.display = 'none';
      if (liff.isLoggedIn()) {
        liff.getProfile().then(profile => {
          lineUserId = profile.userId; lineDisplayName = profile.displayName; linePictureUrl = profile.pictureUrl || "";
          document.getElementById('userNameDisplay').innerText = lineDisplayName;
          document.getElementById('uName').value = lineDisplayName; 
          document.getElementById('bName').value = lineDisplayName; 
          
          if(profile.pictureUrl) document.getElementById('userThumb').src = profile.pictureUrl;
          document.getElementById('userInfo').classList.remove('hidden-mode');
          document.getElementById('btnOptionalLogin').classList.add('hidden-mode');
          
          if (currentMode === 'bind' || currentMode === 'register') openBindLine();
          else if (currentMode === 'upload') openUpload();
          else if (currentMode === 'status') openStatus();
          else if (currentMode === 'meds') openMedHistory();
          else goHome(); 
        });
      } else {
        document.getElementById('btnOptionalLogin').classList.remove('hidden-mode');
        if (currentMode === 'bind' || currentMode === 'register') openBindLine(); 
        else if (currentMode === 'status') openStatus();
        else if (currentMode === 'meds') openMedHistory();
        else goHome();
      }
    }).catch(err => { document.getElementById('loading').style.display = 'none'; goHome(); });
  }

  function doLiffLogout() { if (confirm("確定要登出嗎？")) { if (liff.isLoggedIn()) { liff.logout(); location.href = window.location.href.split('?')[0]; } } }
  function doOptionalLogin() { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=upload" }); }

  function goHome() {
    window.history.replaceState({}, document.title, window.location.pathname);
    document.getElementById('view-home').classList.remove('hidden-mode');
    document.getElementById('view-form').classList.add('hidden-mode');
    document.getElementById('view-bind').classList.add('hidden-mode');
    document.getElementById('view-status').classList.add('hidden-mode');
    document.getElementById('view-meds').classList.add('hidden-mode');
    isRegisterMode = false;
  }

  function openUpload() { document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-bind').classList.add('hidden-mode'); document.getElementById('view-status').classList.add('hidden-mode'); document.getElementById('view-meds').classList.add('hidden-mode'); document.getElementById('view-form').classList.remove('hidden-mode'); if(!liff.isLoggedIn()) document.getElementById('uNotify').value = "電話通知"; }
  function openBindLine() { if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=bind" }); return; } isRegisterMode = true; document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-form').classList.add('hidden-mode'); document.getElementById('view-status').classList.add('hidden-mode'); document.getElementById('view-meds').classList.add('hidden-mode'); document.getElementById('view-bind').classList.remove('hidden-mode'); }
  function openStatus() { if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=status" }); return; } document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-form').classList.add('hidden-mode'); document.getElementById('view-bind').classList.add('hidden-mode'); document.getElementById('view-meds').classList.add('hidden-mode'); document.getElementById('view-status').classList.remove('hidden-mode'); fetchUploadHistory(); }
  function openMedHistory() { if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=meds" }); return; } document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-form').classList.add('hidden-mode'); document.getElementById('view-bind').classList.add('hidden-mode'); document.getElementById('view-status').classList.add('hidden-mode'); document.getElementById('view-meds').classList.remove('hidden-mode'); document.getElementById('medHistoryResult').innerHTML = ''; document.getElementById('qName').value = ''; document.getElementById('qId').value = ''; }

  function parseTwDate(dStr) {
      if (!dStr) return null;
      let s = String(dStr).trim().split('T')[0].split(' ')[0]; 
      if (!s) return null;
      let y, m, d;
      if (s.includes('/') || s.includes('-')) {
          let parts = s.split(/[\/\-]/);
          y = parseInt(parts[0]);
          m = parseInt(parts[1]) - 1;
          d = parseInt(parts[2]);
          if (y < 1911) y += 1911;
      } else {
          let n = s.replace(/\D/g, '');
          if (n.length === 7) {
              y = parseInt(n.substring(0,3)) + 1911;
              m = parseInt(n.substring(3,5)) - 1;
              d = parseInt(n.substring(5,7));
          } else if (n.length === 8) {
              y = parseInt(n.substring(0,4));
              m = parseInt(n.substring(4,6)) - 1;
              d = parseInt(n.substring(6,8));
          } else return null;
      }
      let dt = new Date(y, m, d);
      return isNaN(dt) ? null : dt;
  }

  function formatFullDate(dt) {
      if(!dt) return "未知";
      return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  }

  function formatShortDate(dt) {
      if(!dt) return "未知";
      return String(dt.getMonth()+1).padStart(2,'0') + '/' + String(dt.getDate()).padStart(2,'0');
  }

  function queryMedHistory() {
    const name = document.getElementById('qName').value.trim();
    const idStr = document.getElementById('qId').value.trim().toUpperCase();
    if (!name) return alert("⚠️ 請輸入領藥人姓名！");
    if (!idStr || idStr.length < 10) return alert("⚠️ 請輸入完整的 10 碼身分證字號！");

    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loadingText').innerText = "雲端連線查詢中...";

    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ action: "queryMed", name: name, id: idStr })
    })
    .then(res => res.json())
    .then(res => {
      document.getElementById('loading').style.display = 'none';
      if (res.status === 'success') {
        renderMedHistory(res.data);
      } else {
        alert("❌ 查詢失敗：" + res.message);
      }
    })
    .catch(err => {
      document.getElementById('loading').style.display = 'none';
      alert("連線異常，請稍後再試。");
    });
  }

  function renderMedHistory(data) {
    const container = document.getElementById('medHistoryResult');
    container.innerHTML = '';
    
    data = data.filter(function(r) {
       var nhiCode = String(r.nhi).toUpperCase();
       var drugName = String(r.drug).toUpperCase();
       return !(nhiCode.includes('MA1') || drugName.includes('MA1'));
    });

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="alert alert-light border border-danger text-center text-danger small py-4 fw-bold shadow-sm">⚠️ 查無藥歷資料！<br>請確認【姓名】與【身分證字號】是否完全吻合，<br>或藥局尚未更新您的資料。</div>';
      return;
    }

    let groups = {};
    let groupKeys = [];
    data.forEach(r => {
       let cleanPickupDate = String(r.date).split('T')[0].split(' ')[0]; 
       let rxDt = r.rxDate ? String(r.rxDate).trim() : "";
       let deptStr = translateDept(r.dept);
       
       let isChronic = false;
       let curRefill = 1, totRefill = 1;
       if (r.refill && r.refill.includes('/')) {
           curRefill = parseInt(r.refill.split('/')[0]) || 1;
           totRefill = parseInt(r.refill.split('/')[1]) || 1;
           if (totRefill > 1) isChronic = true;
       }

       let key = "";
       if (isChronic && rxDt) {
           key = "CHRONIC_" + rxDt + "_" + deptStr;
       } else {
           key = "NORMAL_" + cleanPickupDate + "_" + (rxDt || "noRx") + "_" + deptStr;
       }
       
       if (!groups[key]) {
           groups[key] = {
               type: isChronic ? 'chronic' : 'normal',
               rxDateStr: rxDt || "未提供",
               rxDateObj: parseTwDate(rxDt),
               dept: deptStr,
               hospital: r.hospital || "未知醫療院所", // 🔥 讀取醫療院所
               totRefill: totRefill,
               maxCurRefill: curRefill, 
               pickupLog: {}, 
               days: parseInt(r.days) || 28, 
               drugsMap: new Map(), 
               latestPickupDate: cleanPickupDate 
           };
       }

       if (isChronic) {
           if (curRefill > groups[key].maxCurRefill) groups[key].maxCurRefill = curRefill;
           groups[key].pickupLog[curRefill] = cleanPickupDate;
           if (cleanPickupDate > groups[key].latestPickupDate) {
               groups[key].latestPickupDate = cleanPickupDate;
           }
       }

       let drugName = r.drug || '未知藥品';
       if (!groups[key].drugsMap.has(drugName)) {
           groups[key].drugsMap.set(drugName, r);
       }
    });

    let sortedKeys = Object.keys(groups).sort((a, b) => {
        let dateA = groups[a].latestPickupDate.replace(/\D/g, '');
        let dateB = groups[b].latestPickupDate.replace(/\D/g, '');
        return dateB.localeCompare(dateA);
    });

    let html = '';
    let loopIdx = 0; 

    sortedKeys.forEach(k => {
       loopIdx++;
       let safeId = 'collapse_meds_' + loopIdx; 
       let g = groups[k];
       let refillInfoHtml = '';

       if (g.type === 'chronic' && g.rxDateObj) {
           let rxDt = g.rxDateObj;
           let dt2_end = new Date(rxDt); dt2_end.setDate(dt2_end.getDate() + g.days);
           let dt2_start = new Date(dt2_end); dt2_start.setDate(dt2_start.getDate() - 10);
           
           let dt3_end = new Date(rxDt); dt3_end.setDate(dt3_end.getDate() + (g.days * 2));
           let dt3_start = new Date(dt3_end); dt3_start.setDate(dt3_start.getDate() - 10);

           let returnDt = new Date(rxDt); returnDt.setDate(returnDt.getDate() + (g.days * g.totRefill));

           let status2 = "";
           if (g.pickupLog[2]) {
               status2 = `<span class="fw-bold text-success me-2">${formatShortDate(parseTwDate(g.pickupLog[2]))}</span> <span class="badge bg-success shadow-sm" style="font-size:0.85rem;">✅ 已領取</span>`;
           } else if (g.maxCurRefill >= 2) {
               status2 = `<span class="badge bg-success shadow-sm" style="font-size:0.85rem;">✅ 已領取</span>`;
           } else {
               status2 = `<span class="fw-bold text-danger">${formatShortDate(dt2_start)} ~ ${formatShortDate(dt2_end)}</span>`;
           }
           
           let status3 = "";
           if (g.totRefill >= 3) {
               if (g.pickupLog[3]) {
                   status3 = `<span class="fw-bold text-success me-2">${formatShortDate(parseTwDate(g.pickupLog[3]))}</span> <span class="badge bg-success shadow-sm" style="font-size:0.85rem;">✅ 已領取</span>`;
               } else if (g.maxCurRefill >= 3) {
                   status3 = `<span class="badge bg-success shadow-sm" style="font-size:0.85rem;">✅ 已領取</span>`;
               } else {
                   status3 = `<span class="fw-bold text-danger">${formatShortDate(dt3_start)} ~ ${formatShortDate(dt3_end)}</span>`;
               }
           }

           // 🔥 加入醫療院所顯示
           refillInfoHtml = `
              <div class="bg-white border border-info rounded p-3 mb-3 shadow-sm position-relative overflow-hidden">
                 <div class="position-absolute top-0 start-0 w-100 bg-info" style="height:4px;"></div>
                 <div class="d-flex justify-content-between align-items-center mb-2 mt-1">
                     <span class="fw-bold text-dark"><i class="bi bi-file-medical text-info"></i> 慢箋領藥進度</span>
                     <span class="badge bg-primary text-white shadow-sm" style="font-size:0.85rem;">目前進度: ${g.maxCurRefill}/${g.totRefill}</span>
                 </div>
                 <div class="small text-secondary mb-2 border-bottom pb-2">
                    🏥 醫療院所：<span class="fw-bold text-dark">${g.hospital}</span><br>
                    📅 處方開立：<span class="fw-bold text-dark">${formatFullDate(rxDt)}</span> (單次: ${g.days}天)
                 </div>
                 <div class="small text-secondary mb-2 d-flex justify-content-between align-items-center">
                    <span>👉 第二次領藥：</span> 
                    <span class="text-end" style="font-size:1.05rem;">${status2}</span>
                 </div>
                 ${g.totRefill >= 3 ? `
                 <div class="small text-secondary mb-2 d-flex justify-content-between align-items-center">
                    <span>👉 第三次領藥：</span> 
                    <span class="text-end" style="font-size:1.05rem;">${status3}</span>
                 </div>` : ''}
                 <div class="mt-2 pt-2 border-top border-info border-opacity-25 text-dark d-flex justify-content-between align-items-center bg-light p-2 rounded">
                    <span class="small fw-bold">🏥 藥品用罄 (預約回診日)：</span> 
                    <span class="fw-bold text-danger" style="font-size:1.1rem;">${formatFullDate(returnDt)}</span>
                 </div>
              </div>
           `;
       } else {
           let returnDtStr = "未知";
           if(g.rxDateObj) {
               let rDt = new Date(g.rxDateObj); rDt.setDate(rDt.getDate() + g.days);
               returnDtStr = formatFullDate(rDt);
           }
           
           // 🔥 加入醫療院所顯示
           refillInfoHtml = `
              <div class="bg-white border rounded p-3 mb-3 shadow-sm">
                 <div class="d-flex align-items-center mb-2">
                     <div class="bg-success rounded text-white p-1 me-2 shadow-sm"><i class="bi bi-file-earmark-medical"></i></div>
                     <span class="fw-bold text-dark">一般處方紀錄</span>
                 </div>
                 <div class="small text-secondary mb-1">🏥 醫療院所：<span class="fw-bold text-dark">${g.hospital}</span></div>
                 <div class="small text-secondary mb-1">📅 處方開立日：<span class="fw-bold text-dark">${g.rxDateObj ? formatFullDate(g.rxDateObj) : g.rxDateStr}</span></div>
                 <div class="small text-secondary mt-2 pt-2 border-top d-flex justify-content-between bg-light p-2 rounded">
                    <span class="fw-bold">🏥 藥品用罄 (回診日)：</span> 
                    <span class="fw-bold text-danger">${returnDtStr}</span>
                 </div>
              </div>
           `;
       }

       let drugsArray = Array.from(g.drugsMap.values());

       let drugsHtml = drugsArray.map((d, idx) => `
          <div class="border-bottom border-light py-2 ${idx === drugsArray.length-1 ? 'border-0 pb-0' : ''}">
             <div class="fw-bold text-dark mb-1 d-flex align-items-start" style="font-size:0.95rem;">
                <span class="badge bg-success me-2 shadow-sm mt-1" style="font-size:0.75rem; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">${idx + 1}</span>
                <span>${d.drug || '未知藥品'}</span>
             </div>
             <div class="d-flex flex-wrap text-secondary" style="font-size:0.85rem; gap: 8px; padding-left: 30px;">
                <div><span class="badge bg-light text-secondary border me-1 shadow-sm">每次用量</span>${d.dosage || '-'} 粒</div>
                <div><span class="badge bg-light text-secondary border me-1 shadow-sm">天數</span>${d.days || g.days || '-'} 天</div>
                <div class="fw-bold text-success ms-auto">總量: ${d.total || '-'} 粒</div>
             </div>
          </div>
       `).join('');

       html += `
          <div class="card bg-white border border-success border-2 shadow-sm mb-4" style="border-radius:12px; overflow:hidden;">
             <div class="card-header bg-success text-white py-2 px-3 d-flex justify-content-between align-items-center border-0">
                <span class="fw-bold" style="font-size:1.05rem;"><i class="bi bi-calendar-check me-1"></i>${g.latestPickupDate} 領藥紀錄</span>
                <span class="badge bg-white text-success shadow-sm" style="font-size:0.85rem;">${g.dept}</span>
             </div>
             <div class="card-body p-3" style="background-color:#fbfdfc;">
                ${refillInfoHtml}
                
                <button class="btn btn-outline-success btn-sm w-100 fw-bold rounded-pill shadow-sm mt-1" type="button" data-bs-toggle="collapse" data-bs-target="#${safeId}">
                  <i class="bi bi-journal-medical"></i> 展開藥品明細 (${drugsArray.length} 項) <i class="bi bi-chevron-down ms-1"></i>
                </button>
                
                <div class="collapse mt-2" id="${safeId}">
                  <div class="bg-white rounded p-2 shadow-sm border border-light">
                    ${drugsHtml}
                  </div>
                </div>
                
             </div>
          </div>
       `;
    });

    container.innerHTML = html;
  }

  function fetchUploadHistory() {
    if (!lineUserId) return;
    document.getElementById('uploadHistoryList').innerHTML = `<div class="text-center text-muted small py-4"><div class="spinner-border spinner-border-sm text-info me-2"></div> 讀取紀錄中...</div>`;
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "history", lineUserId: lineUserId }) })
    .then(res => res.json()).then(res => {
      if (res.status === 'success') renderUploadHistory(res.history);
      else document.getElementById('uploadHistoryList').innerHTML = '<div class="text-center text-danger small py-3">讀取失敗</div>';
    }).catch(err => { document.getElementById('uploadHistoryList').innerHTML = '<div class="text-center text-danger small py-3">連線異常</div>'; });
  }

  function renderUploadHistory(data) {
    const container = document.getElementById('uploadHistoryList'); container.innerHTML = '';
    if (!data || data.length === 0) { container.innerHTML = '<div class="text-center text-muted small py-4 bg-white rounded-3 shadow-sm border border-light">您目前尚無處方箋上傳紀錄</div>'; return; }
    data.forEach(item => {
      let statusColor = item.status === '可領藥' ? 'bg-success' : (item.status === '待處理' ? 'bg-warning text-dark' : 'bg-primary');
      let imgSrc = item.img || 'https://placehold.co/60?text=No+Img';
      let highResImg = item.img ? item.img.replace('w200', 'w1600') : imgSrc;
      let cleanDate = String(item.date).split('T')[0].split(' ')[0];
      container.innerHTML += `<div class="card p-2 mb-2 shadow-sm border-0 flex-row align-items-center bg-light"><img src="${imgSrc}" style="width: 55px; height: 55px; object-fit: cover; border-radius: 8px; margin-right: 15px; border:1px solid #ddd;" onclick="window.open('${highResImg}', '_blank')"><div class="flex-grow-1"><div class="fw-bold" style="font-size:0.95rem; color:#333;">${cleanDate}</div><div class="small text-muted">${item.dept || '一般領藥'}</div></div><div><span class="badge ${statusColor} px-2 py-1 shadow-sm">${item.status}</span></div></div>`;
    });
  }

  function handleFile(input) {
    if (input.files && input.files[0]) {
      const file = input.files[0]; fileName = file.name; const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image(); img.src = e.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height; 
          const MAX_SIZE = 1600;
          if (w > h && w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } 
          else if (h > w && h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
          canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
          base64Image = canvas.toDataURL('image/jpeg', 0.85);
          document.getElementById('previewImg').src = base64Image; document.getElementById('previewImg').style.display = 'block'; document.getElementById('placeholder').style.display = 'none';
        }
      }; reader.readAsDataURL(file);
    }
  }

  function submitData() {
    const name = document.getElementById('uName').value; const phone = document.getElementById('uPhone').value; let dept = document.getElementById('uDept').value; let notify = document.getElementById('uNotify').value;
    if (notify === "LINE通知" && !liff.isLoggedIn()) return alert("⚠️ 您目前尚未綁定 LINE！\n請點擊上方的「登入 LINE」，或改選【電話通知】。");
    if (!base64Image) return alert("⚠️ 請拍攝處方箋！"); if (!name || !phone) return alert("⚠️ 請填寫完整資料！");
    document.getElementById('loading').style.display = 'flex'; document.getElementById('loadingText').innerText = "資料傳送中...";
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "upload", name: name, lineName: lineDisplayName, linePic: linePictureUrl, phone: phone, dept: dept, notify: notify, fileData: base64Image, fileName: fileName, lineUserId: lineUserId, isRegister: false }) })
    .then(res => res.json()).then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success') { alert("✅ 處方箋上傳成功！\n系統已發送 LINE 通知，藥師處理完畢將立即通知您。"); goHome(); } 
      else { alert("❌ 失敗：" + res.message); }
    }).catch(err => { document.getElementById('loading').style.display = 'none'; goHome(); });
  }

  function submitBind() {
    const name = document.getElementById('bName').value; const phone = document.getElementById('bPhone').value;
    if (!name || !phone) return alert("⚠️ 請填寫完整真實姓名與電話！");
    document.getElementById('loading').style.display = 'flex'; document.getElementById('loadingText').innerText = "綁定資料傳送中...";
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "upload", name: name, lineName: lineDisplayName, linePic: linePictureUrl, phone: phone, dept: "LINE綁定", notify: "LINE通知", fileData: "", fileName: "", lineUserId: lineUserId, isRegister: true }) })
    .then(res => res.json()).then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success') { alert("✅ 綁定成功！\n藥局未來將能透過 LINE 通知您領藥。"); if(liff.isInClient()) liff.closeWindow(); else goHome(); } 
      else if(res.status === 'duplicate') { alert("⚠️ " + res.message); goHome(); } 
      else { alert("❌ 失敗：" + res.message); }
    }).catch(err => { document.getElementById('loading').style.display = 'none'; goHome(); });
  }
</script>
</body>
</html>
