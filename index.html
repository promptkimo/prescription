<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>樂森藥局 雲服務</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { background-color: #ffffff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .container { max-width: 600px; padding: 0; flex-grow: 1; display: flex; flex-direction: column; margin: 0 auto; width: 100%; height: 100%; }
    .card { border-radius: 12px; border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .user-card { background: #f8f9fa; padding: 10px 15px; border-radius: 16px; margin-bottom: 5px; flex-shrink: 0; border: 1px solid #f0f2f5; }
    .user-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid #06C755; }
    .preview-box { width: 100%; height: 200px; background: #f8f9fa; border: 2px dashed #ced4da; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; margin-bottom: 15px; }
    .preview-box img { width: 100%; height: 100%; object-fit: contain; display: none; }
    .placeholder-text { color: #6c757d; text-align: center; font-size: 0.9rem; }
    .hidden-mode { display: none !important; } 
    #view-home { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
    .brand-header { background: #ffffff; padding: 30px 20px 10px; text-align: center; margin-bottom: 5px; flex-shrink: 0; }
    .brand-title { font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 3px; color: #06C755; } 
    .brand-subtitle { font-size: 0.85rem; color: #6c757d; margin-bottom: 0; font-weight: 500; letter-spacing: 1px; }
    .home-content { display: flex; flex-direction: column; flex-grow: 1; padding: 0 20px 30px 20px; min-height: 0; }
    .home-btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 15px; width: 100%; max-width: 450px; margin: 35px auto auto auto; justify-content: center; justify-items: center; }
    .menu-btn { background: transparent !important; border: none !important; box-shadow: none !important; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); outline: none; cursor: pointer; text-decoration: none; padding: 0; width: 100%; }
    .menu-btn:hover { transform: translateY(-4px); }
    .menu-btn:active { transform: scale(0.92); opacity: 0.85; }
    .menu-icon { width: 110px; height: 110px; margin-bottom: 12px; object-fit: contain; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.08)); transition: transform 0.3s; }
    .menu-btn span { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.5px; color: #333; text-align: center; line-height: 1.35; }
    .sub-view { flex-grow: 1; padding: 15px 15px 30px 15px; overflow-y: auto; height: 100%; }
    .back-btn-container { margin-bottom: 15px; position: sticky; top: 0; z-index: 10; background: #ffffff; padding-top: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0f2f5; }
    .back-btn { font-size: 1rem; font-weight: bold; color: #495057; padding: 8px 18px; background: #f8f9fa; border-radius: 50px; display: inline-flex; align-items: center; border: none; transition: 0.2s; }
    .back-btn:active { transform: scale(0.95); background: #e9ecef; }
    .back-btn i { font-size: 1.2rem; margin-right: 5px; color: #06C755; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner-border text-success" role="status"></div><p class="mt-3 text-secondary fw-bold" id="loadingText">系統連線中...</p></div>

<div class="container"> 
  <div id="view-home">
    <div class="brand-header"><h1 class="brand-title">樂森藥局</h1><p class="brand-subtitle">Lawson Pharmacy Cloud</p></div>
    <div class="home-content">
      <div class="user-card d-flex justify-content-between align-items-center hidden-mode" id="userInfo">
        <div class="d-flex align-items-center"><img id="userThumb" src="https://placehold.co/50" class="user-avatar"><div><div class="small text-muted" style="font-size:0.75rem;">目前登入帳號</div><div class="fw-bold text-dark" id="userNameDisplay" style="font-size:0.95rem;">訪客</div></div></div>
        <button class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-bold" onclick="doLiffLogout()">登出</button>
      </div>
      
      <div class="home-btn-group">
        <button class="menu-btn" onclick="openUpload()"><img src="1.png" class="menu-icon" alt="上傳處方箋"><span>上傳處方箋</span></button>
        <button class="menu-btn" onclick="openBindLine()"><img src="2.png" class="menu-icon" alt="LINE 綁定"><span>LINE 通知<br>綁定領藥</span></button>
        <button class="menu-btn" onclick="openStatus()"><img src="3.png" class="menu-icon" alt="領藥狀態查詢"><span>領藥狀態查詢</span></button>
        <button class="menu-btn" onclick="openMedHistory()"><img src="4.png" class="menu-icon" alt="雲端藥歷"><span>雲端藥歷查詢</span></button>
      </div>
    </div>
  </div>

  <div id="view-form" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0 bg-light">
      <h5 class="fw-bold text-success mb-3" id="formTitle"><i class="bi bi-camera"></i> 上傳處方箋</h5>
      <div id="cameraSection"><div class="preview-box" onclick="document.getElementById('fileInput').click()"><div class="placeholder-text" id="placeholder"><span style="font-size: 2rem;">📷</span><br>點此拍照 / 選照片</div><img id="previewImg"></div><input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(this)"></div>
      <div class="mb-3"><label class="form-label small fw-bold">領藥人姓名 (病人)</label><input type="text" class="form-control" id="uName"></div>
      <div class="mb-3"><label class="form-label small fw-bold">聯絡電話</label><input type="tel" class="form-control" id="uPhone" placeholder="請輸入聯絡電話"></div>
      <div class="mb-3" id="deptSection"><label class="form-label small fw-bold">科別 (選填)</label><input type="text" class="form-control" id="uDept" placeholder="例如：牙科、內科..."></div>
      <div class="mb-4" id="notifySection"><label class="form-label small fw-bold">希望通知方式</label><select class="form-select" id="uNotify"><option value="LINE通知" id="optLine" selected>LINE 通知 (推薦)</option><option value="電話通知" id="optPhone">電話通知</option></select></div>
      <button class="btn btn-success w-100 fw-bold py-2" onclick="submitData()">確認極速上傳</button>
    </div>
  </div>

  <div id="view-bind" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0 border-top border-primary border-4 bg-light">
      <h5 class="fw-bold text-primary mb-3"><i class="bi bi-link-45deg"></i> LINE 綁定作業</h5>
      <p class="small text-muted mb-4">請填寫您的真實資料。綁定完成後，藥師就能直接透過 LINE 通知您來拿藥！</p>
      <div class="mb-3"><label class="form-label small fw-bold text-primary">您的真實姓名</label><input type="text" class="form-control" id="bName" placeholder="請輸入姓名"></div>
      <div class="mb-4"><label class="form-label small fw-bold text-primary">聯絡電話</label><input type="tel" class="form-control" id="bPhone" placeholder="請輸入手機號碼"></div>
      <button class="btn btn-primary w-100 fw-bold py-2" onclick="submitBind()">🔗 確認綁定 LINE</button>
    </div>
  </div>

  <div id="view-status" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0">
      <h5 class="fw-bold text-info mb-3"><i class="bi bi-card-checklist"></i> 領藥狀態查詢</h5>
      <p class="small text-muted mb-3">以下是您曾經上傳過的處方箋紀錄與目前處理進度：</p>
      <div id="uploadHistoryList"></div>
    </div>
  </div>

  <div id="view-meds" class="hidden-mode sub-view">
    <div class="back-btn-container"><button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button></div>
    <div class="card p-4 shadow-sm border-0 border-top border-dark border-4 bg-light">
      <h5 class="fw-bold text-dark mb-3"><i class="bi bi-cloud-arrow-up"></i> 雲端藥歷查詢</h5>
      <p class="small text-muted mb-4">為保護個人隱私，請輸入【領藥人姓名】與【身分證字號】進行安全驗證，以查詢詳細用藥紀錄。</p>
      <div class="mb-3"><label class="form-label small fw-bold text-primary">領藥人真實姓名</label><input type="text" class="form-control" id="qName" placeholder="請輸入領藥人的姓名"></div>
      <div class="mb-4"><label class="form-label small fw-bold text-danger">領藥人身分證字號</label><input type="text" class="form-control text-uppercase" id="qId" placeholder="例如：A123456789"></div>
      <button class="btn btn-dark w-100 fw-bold py-2 mb-4 shadow-sm" onclick="queryMedHistory()"><i class="bi bi-search"></i> 安全查詢</button>
      <div id="medHistoryResult"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyUXCejmkI52ZJVUN1K1t1j2ZvfdZMCgHsgB79okITgzn7to2sfte43R5I0GOQnFp1opQ/exec"; 
  const LIFF_ID = "2008912977-DuJTm5u1"; 

  const NHI_DEPT_MAP = { "00": "不分科", "01": "家醫科", "02": "內科" }; 
  function translateDept(codeStr) {
      if (!codeStr) return "一般領藥";
      let c = String(codeStr).trim().toUpperCase();
      if (c.length === 1 && !isNaN(c)) c = "0" + c;
      return NHI_DEPT_MAP[c] ? NHI_DEPT_MAP[c] : c; 
  }

  let lineUserId = "", lineDisplayName = "", linePictureUrl = "", base64Image = "", fileName = "", isRegisterMode = false;
  const urlParams = new URLSearchParams(window.location.search);
  const currentMode = urlParams.get('mode');

  window.onload = function() { initLiff(); };

  function initLiff() {
    liff.init({ liffId: LIFF_ID }).then(() => {
      document.getElementById('loading').style.display = 'none';
      if (liff.isLoggedIn()) {
        liff.getProfile().then(profile => {
          lineUserId = profile.userId; lineDisplayName = profile.displayName; linePictureUrl = profile.pictureUrl || "";
          document.getElementById('userNameDisplay').innerText = lineDisplayName;
          document.getElementById('uName').value = lineDisplayName; 
          document.getElementById('bName').value = lineDisplayName; 
          
          if(profile.pictureUrl) document.getElementById('userThumb').src = profile.pictureUrl;
          document.getElementById('userInfo').classList.remove('hidden-mode');
          
          // 如果網址帶有 mode 參數，自動開啟對應頁面
          if (currentMode === 'bind' || currentMode === 'register') openBindLine();
          else if (currentMode === 'upload') openUpload();
          else if (currentMode === 'status') openStatus();
          else if (currentMode === 'meds') openMedHistory();
          else goHome(); 
        });
      } else {
        // 🔥 如果沒登入，且網址有帶 mode，就直接踢去登入畫面
        if (currentMode) {
           liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=" + currentMode });
        } else {
           goHome(); // 停在首頁，等他們點擊按鈕
        }
      }
    }).catch(err => { document.getElementById('loading').style.display = 'none'; goHome(); });
  }

  function doLiffLogout() { if (confirm("確定要登出嗎？")) { if (liff.isLoggedIn()) { liff.logout(); location.href = window.location.href.split('?')[0]; } } }

  function goHome() {
    window.history.replaceState({}, document.title, window.location.pathname);
    document.getElementById('view-home').classList.remove('hidden-mode');
    document.getElementById('view-form').classList.add('hidden-mode');
    document.getElementById('view-bind').classList.add('hidden-mode');
    document.getElementById('view-status').classList.add('hidden-mode');
    document.getElementById('view-meds').classList.add('hidden-mode');
    isRegisterMode = false;
  }

  // 🔥 四個按鈕全面強制檢查登入
  function openUpload() { 
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=upload" }); return; }
    document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-bind').classList.add('hidden-mode'); document.getElementById('view-status').classList.add('hidden-mode'); document.getElementById('view-meds').classList.add('hidden-mode'); document.getElementById('view-form').classList.remove('hidden-mode'); 
    document.getElementById('uNotify').value = "LINE通知"; // 強制預設為LINE通知
  }
  
  function openBindLine() { 
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=bind" }); return; } 
    isRegisterMode = true; document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-form').classList.add('hidden-mode'); document.getElementById('view-status').classList.add('hidden-mode'); document.getElementById('view-meds').classList.add('hidden-mode'); document.getElementById('view-bind').classList.remove('hidden-mode'); 
  }
  
  function openStatus() { 
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=status" }); return; } 
    document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-form').classList.add('hidden-mode'); document.getElementById('view-bind').classList.add('hidden-mode'); document.getElementById('view-meds').classList.add('hidden-mode'); document.getElementById('view-status').classList.remove('hidden-mode'); 
    fetchUploadHistory(); 
  }
  
  function openMedHistory() { 
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=meds" }); return; } 
    document.getElementById('view-home').classList.add('hidden-mode'); document.getElementById('view-form').classList.add('hidden-mode'); document.getElementById('view-bind').classList.add('hidden-mode'); document.getElementById('view-status').classList.add('hidden-mode'); document.getElementById('view-meds').classList.remove('hidden-mode'); 
    document.getElementById('medHistoryResult').innerHTML = ''; document.getElementById('qName').value = ''; document.getElementById('qId').value = ''; 
  }

  function fetchUploadHistory() {
    if (!lineUserId) return;
    document.getElementById('uploadHistoryList').innerHTML = `<div class="text-center text-muted small py-4"><div class="spinner-border spinner-border-sm text-info me-2"></div> 讀取紀錄中...</div>`;
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "history", lineUserId: lineUserId }) })
    .then(res => res.json()).then(res => {
      if (res.status === 'success') {
        const container = document.getElementById('uploadHistoryList'); container.innerHTML = '';
        if (!res.history || res.history.length === 0) { container.innerHTML = '<div class="text-center text-muted small py-4 bg-white rounded-3 shadow-sm border border-light">您目前尚無處方箋上傳紀錄</div>'; return; }
        res.history.forEach(item => {
          let statusColor = item.status === '可領藥' ? 'bg-success' : (item.status === '待處理' ? 'bg-warning text-dark' : 'bg-primary');
          let imgSrc = item.img || 'https://placehold.co/60?text=No+Img';
          let cleanDate = String(item.date).split('T')[0].split(' ')[0];
          container.innerHTML += `<div class="card p-2 mb-2 shadow-sm border-0 flex-row align-items-center bg-light"><img src="${imgSrc}" style="width: 55px; height: 55px; object-fit: cover; border-radius: 8px; margin-right: 15px; border:1px solid #ddd;" onclick="window.open('${imgSrc.replace('w200','w1600')}', '_blank')"><div class="flex-grow-1"><div class="fw-bold" style="font-size:0.95rem; color:#333;">${cleanDate}</div><div class="small text-muted">${item.dept || '一般領藥'}</div></div><div><span class="badge ${statusColor} px-2 py-1 shadow-sm">${item.status}</span></div></div>`;
        });
      }
    }).catch(err => { document.getElementById('uploadHistoryList').innerHTML = '<div class="text-center text-danger small py-3">連線異常</div>'; });
  }

  function handleFile(input) {
    if (input.files && input.files[0]) {
      const file = input.files[0]; fileName = file.name; const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image(); img.src = e.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height; const MAX_SIZE = 1600;
          if (w > h && w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } else if (h > w && h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
          canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
          base64Image = canvas.toDataURL('image/jpeg', 0.85);
          document.getElementById('previewImg').src = base64Image; document.getElementById('previewImg').style.display = 'block'; document.getElementById('placeholder').style.display = 'none';
        }
      }; reader.readAsDataURL(file);
    }
  }

  function submitData() {
    const name = document.getElementById('uName').value; const phone = document.getElementById('uPhone').value; let dept = document.getElementById('uDept').value; let notify = document.getElementById('uNotify').value;
    if (!base64Image) return alert("⚠️ 請拍攝處方箋！"); if (!name || !phone) return alert("⚠️ 請填寫完整資料！");
    
    document.getElementById('loading').style.display = 'flex'; 
    document.getElementById('loadingText').innerText = "處方箋極速上傳中...";
    
    fetch(GAS_URL, { 
      method: "POST", 
      body: JSON.stringify({ action: "upload", name: name, lineName: lineDisplayName, linePic: linePictureUrl, phone: phone, dept: dept, notify: notify, fileData: base64Image, fileName: fileName, lineUserId: lineUserId, isRegister: false }) 
    })
    .then(res => res.json())
    .then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success') {
        alert("✅ 處方箋已成功送達雲端！\nAI 助理將在後台自動為您建檔，您可以安心關閉此畫面，稍後將在 LINE 收到確認通知。");
        if(liff.isInClient()) liff.closeWindow(); else goHome();
      } else {
        alert("❌ 失敗：" + res.message);
      }
    }).catch(err => { document.getElementById('loading').style.display = 'none'; goHome(); });
  }

  function submitBind() {
    const name = document.getElementById('bName').value; const phone = document.getElementById('bPhone').value;
    if (!name || phone.length < 9) return alert("⚠️ 請填寫完整真實姓名與電話！");
    document.getElementById('loading').style.display = 'flex'; document.getElementById('loadingText').innerText = "綁定資料傳送中...";
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "upload", name: name, lineName: lineDisplayName, linePic: linePictureUrl, phone: phone, dept: "LINE綁定", notify: "LINE通知", fileData: "", fileName: "", lineUserId: lineUserId, isRegister: true }) })
    .then(res => res.json()).then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success') { alert("✅ 綁定成功！\n藥局未來將能透過 LINE 通知您領藥。"); if(liff.isInClient()) liff.closeWindow(); else goHome(); } 
      else if(res.status === 'duplicate') { alert("⚠️ " + res.message); goHome(); } 
      else { alert("❌ 失敗：" + res.message); }
    }).catch(err => { document.getElementById('loading').style.display = 'none'; goHome(); });
  }
</script>
</body>
</html>
