<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>樂森藥局 雲服務</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    body { background-color: #f0f2f5; font-family: -apple-system, sans-serif; padding-bottom: 30px; margin: 0; }
    .container { max-width: 600px; padding: 0; }
    .card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
    
    .user-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .user-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid #06C755; }
    
    .preview-box { width: 100%; height: 200px; background: #e9ecef; border: 2px dashed #ced4da; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; margin-bottom: 15px; }
    .preview-box img { width: 100%; height: 100%; object-fit: contain; display: none; }
    .placeholder-text { color: #6c757d; text-align: center; font-size: 0.9rem; }
    
    .hidden-mode { display: none !important; } 

    .brand-header { background: linear-gradient(135deg, #06C755 0%, #009933 100%); padding: 45px 20px 35px; border-radius: 0 0 25px 25px; text-align: center; margin-bottom: 20px; color: white; box-shadow: 0 4px 15px rgba(6, 199, 85, 0.2); }
    .brand-title { font-weight: 900; font-size: 2rem; letter-spacing: 2px; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.15); } 
    .brand-subtitle { font-size: 0.95rem; opacity: 0.9; margin-bottom: 0; font-weight: 500; letter-spacing: 1px; }

    .padded-view { padding: 15px 15px 0 15px; }

    .back-btn-container { margin-bottom: 15px; }
    .back-btn { font-size: 1rem; font-weight: bold; color: #495057; padding: 8px 18px; background: white; border-radius: 50px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: inline-flex; align-items: center; border: none; transition: 0.2s; }
    .back-btn:active { transform: scale(0.95); background: #f8f9fa; }
    .back-btn i { font-size: 1.2rem; margin-right: 5px; color: #06C755; }

    .menu-btn { padding: 20px; border-radius: 16px; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; transition: 0.2s; border: 2px solid; }
    .menu-btn i { font-size: 2rem; margin-bottom: 8px; }
    .menu-btn:active:not(:disabled) { transform: scale(0.97); }

    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner-border text-success" role="status"></div>
  <p class="mt-3 text-secondary fw-bold" id="loadingText">系統連線中...</p>
</div>

<div class="container"> 

  <div id="view-home">
    <div class="brand-header">
      <h1 class="brand-title">樂森藥局</h1>
      <p class="brand-subtitle">Lawson Pharmacy Cloud</p>
    </div>

    <div class="px-3">
      <div class="user-card d-flex justify-content-between align-items-center hidden-mode" id="userInfo">
        <div class="d-flex align-items-center">
          <img id="userThumb" src="https://placehold.co/50?text=U" class="user-avatar">
          <div>
            <div class="small text-muted">目前登入帳號</div>
            <div class="fw-bold text-dark" id="userNameDisplay">訪客</div>
          </div>
        </div>
        <button class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-bold" onclick="doLiffLogout()">登出</button>
      </div>

      <div class="d-grid gap-3">
        <button class="btn btn-outline-success menu-btn" onclick="openUpload()">
          <i class="bi bi-camera"></i>
          <span>1. 上傳處方箋</span>
        </button>

        <button class="btn btn-outline-primary menu-btn" onclick="openBindLine()">
          <i class="bi bi-link-45deg"></i>
          <span>2. LINE 綁定通知領藥</span>
        </button>

        <button class="btn btn-outline-info menu-btn" onclick="openStatus()">
          <i class="bi bi-card-checklist"></i>
          <span>3. 查看處方狀態</span>
        </button>

        <button class="btn btn-outline-secondary menu-btn" disabled style="opacity: 0.6; cursor: not-allowed; border-style: dashed;">
          <i class="bi bi-cloud-arrow-up"></i>
          <span>4. 雲端藥歷更新中 (尚未開放)</span>
        </button>
      </div>
    </div>
  </div>

  <div id="view-form" class="hidden-mode padded-view">
    <div class="back-btn-container">
      <button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button>
    </div>

    <div class="card p-4 shadow-sm border-0">
      <h5 class="fw-bold text-success mb-3" id="formTitle"><i class="bi bi-camera"></i> 上傳處方箋</h5>
      
      <div id="btnOptionalLogin" class="alert alert-warning small d-flex justify-content-between align-items-center hidden-mode p-2 mb-3">
         <span class="fw-bold text-dark">未綁定 LINE (僅能選電話通知)</span>
         <button class="btn btn-sm btn-success fw-bold rounded-pill px-3" onclick="doOptionalLogin()">登入 LINE</button>
      </div>

      <div id="cameraSection">
          <div class="preview-box" onclick="document.getElementById('fileInput').click()">
          <div class="placeholder-text" id="placeholder">
              <span style="font-size: 2rem;">📷</span><br>點此拍照 / 選照片
          </div>
          <img id="previewImg">
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(this)">
      </div>

      <div class="mb-3"><label class="form-label small fw-bold">領藥人姓名 (病人)</label><input type="text" class="form-control" id="uName"></div>
      <div class="mb-3"><label class="form-label small fw-bold">聯絡電話</label><input type="tel" class="form-control" id="uPhone" placeholder="請輸入聯絡電話"></div>
      <div class="mb-3" id="deptSection"><label class="form-label small fw-bold">科別 (選填)</label><input type="text" class="form-control" id="uDept" placeholder="例如：牙科、內科..."></div>
      <div class="mb-4" id="notifySection">
        <label class="form-label small fw-bold">希望通知方式</label>
        <select class="form-select" id="uNotify">
          <option value="LINE通知" id="optLine" selected>LINE 通知 (推薦)</option>
          <option value="電話通知" id="optPhone">電話通知</option>
        </select>
      </div>

      <button class="btn btn-success w-100 fw-bold py-2" onclick="submitData()">確認上傳</button>
    </div>
  </div>

  <div id="view-bind" class="hidden-mode padded-view">
    <div class="back-btn-container">
      <button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button>
    </div>

    <div class="card p-4 shadow-sm border-0 border-top border-primary border-4">
      <h5 class="fw-bold text-primary mb-3"><i class="bi bi-link-45deg"></i> LINE 綁定作業</h5>
      <p class="small text-muted mb-4">請填寫您的真實資料。綁定完成後，藥師就能直接透過 LINE 通知您來拿藥！</p>

      <div class="mb-3">
        <label class="form-label small fw-bold text-primary">您的真實姓名</label>
        <input type="text" class="form-control" id="bName" placeholder="請輸入姓名">
      </div>
      <div class="mb-4">
        <label class="form-label small fw-bold text-primary">聯絡電話</label>
        <input type="tel" class="form-control" id="bPhone" placeholder="請輸入手機號碼">
      </div>

      <button class="btn btn-primary w-100 fw-bold py-2" onclick="submitBind()">🔗 確認綁定 LINE</button>
    </div>
  </div>

  <div id="view-status" class="hidden-mode padded-view">
    <div class="back-btn-container">
      <button class="back-btn" onclick="goHome()"><i class="bi bi-chevron-left"></i> 返回主畫面</button>
    </div>

    <div class="card p-4 shadow-sm border-0">
      <h5 class="fw-bold text-info mb-3"><i class="bi bi-card-checklist"></i> 處方狀態查詢</h5>
      <p class="small text-muted mb-3">以下是您曾經上傳過的處方箋紀錄與目前處理進度：</p>
      
      <div id="uploadHistoryList">
        </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyUXCejmkI52ZJVUN1K1t1j2ZvfdZMCgHsgB79okITgzn7to2sfte43R5I0GOQnFp1opQ/exec"; 
  const LIFF_ID = "2008912977-DuJTm5u1"; 

  let lineUserId = "", lineDisplayName = "", base64Image = "", fileName = "", isRegisterMode = false;
  const urlParams = new URLSearchParams(window.location.search);
  const currentMode = urlParams.get('mode');

  window.onload = function() { initLiff(); };

  function initLiff() {
    liff.init({ liffId: LIFF_ID }).then(() => {
      document.getElementById('loading').style.display = 'none';

      if (liff.isLoggedIn()) {
        liff.getProfile().then(profile => {
          lineUserId = profile.userId; lineDisplayName = profile.displayName;
          document.getElementById('userNameDisplay').innerText = lineDisplayName;
          document.getElementById('uName').value = lineDisplayName; 
          document.getElementById('bName').value = lineDisplayName; 
          if(profile.pictureUrl) document.getElementById('userThumb').src = profile.pictureUrl;
          
          document.getElementById('userInfo').classList.remove('hidden-mode');
          document.getElementById('btnOptionalLogin').classList.add('hidden-mode');

          // 🔥 根據網址參數自動導航
          if (currentMode === 'bind' || currentMode === 'register') openBindLine();
          else if (currentMode === 'upload') openUpload();
          else if (currentMode === 'status') openStatus();
          else goHome(); 
        });
      } else {
        document.getElementById('btnOptionalLogin').classList.remove('hidden-mode');
        
        if (currentMode === 'bind' || currentMode === 'register') openBindLine(); 
        else if (currentMode === 'status') openStatus();
        else goHome();
      }
    }).catch(err => { document.getElementById('loading').style.display = 'none'; goHome(); });
  }

  function doLiffLogout() { if (confirm("確定要登出嗎？")) { if (liff.isLoggedIn()) { liff.logout(); location.href = window.location.href.split('?')[0]; } } }
  function doOptionalLogin() { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=upload" }); }

  function goHome() {
    window.history.replaceState({}, document.title, window.location.pathname);
    document.getElementById('view-home').classList.remove('hidden-mode');
    document.getElementById('view-form').classList.add('hidden-mode');
    document.getElementById('view-bind').classList.add('hidden-mode');
    document.getElementById('view-status').classList.add('hidden-mode');
    isRegisterMode = false;
  }

  function openUpload() {
    document.getElementById('view-home').classList.add('hidden-mode');
    document.getElementById('view-bind').classList.add('hidden-mode');
    document.getElementById('view-status').classList.add('hidden-mode');
    document.getElementById('view-form').classList.remove('hidden-mode');
    
    if(!liff.isLoggedIn()) { 
      document.getElementById('uNotify').value = "電話通知"; 
    } 
  }

  function openBindLine() {
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=bind" }); return; }
    isRegisterMode = true;
    document.getElementById('view-home').classList.add('hidden-mode');
    document.getElementById('view-form').classList.add('hidden-mode');
    document.getElementById('view-status').classList.add('hidden-mode');
    document.getElementById('view-bind').classList.remove('hidden-mode'); 
  }

  // 🔥 打開狀態查詢頁面
  function openStatus() {
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href.split('?')[0] + "?mode=status" }); return; }
    
    document.getElementById('view-home').classList.add('hidden-mode');
    document.getElementById('view-form').classList.add('hidden-mode');
    document.getElementById('view-bind').classList.add('hidden-mode');
    document.getElementById('view-status').classList.remove('hidden-mode');
    
    fetchUploadHistory();
  }

  function fetchUploadHistory() {
    if (!lineUserId) return;
    document.getElementById('uploadHistoryList').innerHTML = `<div class="text-center text-muted small py-4"><div class="spinner-border spinner-border-sm text-info me-2"></div> 讀取紀錄中...</div>`;
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "history", lineUserId: lineUserId }) })
    .then(res => res.json()).then(res => {
      if (res.status === 'success') renderUploadHistory(res.history);
      else document.getElementById('uploadHistoryList').innerHTML = '<div class="text-center text-danger small py-3">讀取失敗</div>';
    }).catch(err => { document.getElementById('uploadHistoryList').innerHTML = '<div class="text-center text-danger small py-3">連線異常</div>'; });
  }

  function renderUploadHistory(data) {
    const container = document.getElementById('uploadHistoryList'); container.innerHTML = '';
    if (!data || data.length === 0) { container.innerHTML = '<div class="text-center text-muted small py-4 bg-white rounded-3 shadow-sm border border-light">您目前尚無處方箋上傳紀錄</div>'; return; }
    data.forEach(item => {
      let statusColor = item.status === '可領藥' ? 'bg-success' : (item.status === '待處理' ? 'bg-warning text-dark' : 'bg-primary');
      let imgSrc = item.img || 'https://placehold.co/60?text=No+Img';
      container.innerHTML += `<div class="card p-2 mb-2 shadow-sm border-0 flex-row align-items-center bg-light"><img src="${imgSrc}" style="width: 55px; height: 55px; object-fit: cover; border-radius: 8px; margin-right: 15px; border:1px solid #ddd;" onclick="window.open('${item.img}', '_blank')"><div class="flex-grow-1"><div class="fw-bold" style="font-size:0.95rem; color:#333;">${item.date}</div><div class="small text-muted">${item.dept || '一般領藥'}</div></div><div><span class="badge ${statusColor} px-2 py-1 shadow-sm">${item.status}</span></div></div>`;
    });
  }

  function handleFile(input) {
    if (input.files && input.files[0]) {
      const file = input.files[0]; fileName = file.name; const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image(); img.src = e.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height; if(w > 800) { h *= 800/w; w = 800; }
          canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
          base64Image = canvas.toDataURL('image/jpeg', 0.7);
          document.getElementById('previewImg').src = base64Image; document.getElementById('previewImg').style.display = 'block'; document.getElementById('placeholder').style.display = 'none';
        }
      }; reader.readAsDataURL(file);
    }
  }

  function submitData() {
    const name = document.getElementById('uName').value; const phone = document.getElementById('uPhone').value; let dept = document.getElementById('uDept').value; let notify = document.getElementById('uNotify').value;
    if (notify === "LINE通知" && !liff.isLoggedIn()) return alert("⚠️ 您目前尚未綁定 LINE！\n請點擊上方的「登入 LINE」，或改選【電話通知】。");
    if (!base64Image) return alert("⚠️ 請拍攝處方箋！"); if (!name || !phone) return alert("⚠️ 請填寫完整資料！");
    document.getElementById('loading').style.display = 'flex'; document.getElementById('loadingText').innerText = "資料傳送中...";
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "upload", name: name, lineName: lineDisplayName, phone: phone, dept: dept, notify: notify, fileData: base64Image, fileName: fileName, lineUserId: lineUserId, isRegister: false }) })
    .then(res => res.json()).then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success') { alert("✅ 處方箋上傳成功！\n系統已發送 LINE 通知，藥師處理完畢將立即通知您。"); goHome(); } 
      else { alert("❌ 失敗：" + res.message); }
    }).catch(err => { document.getElementById('loading').style.display = 'none'; goHome(); });
  }

  function submitBind() {
    const name = document.getElementById('bName').value; const phone = document.getElementById('bPhone').value;
    if (!name || !phone) return alert("⚠️ 請填寫完整真實姓名與電話！");
    document.getElementById('loading').style.display = 'flex'; document.getElementById('loadingText').innerText = "綁定資料傳送中...";
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "upload", name: name, lineName: lineDisplayName, phone: phone, dept: "LINE綁定", notify: "LINE通知", fileData: "", fileName: "", lineUserId: lineUserId, isRegister: true }) })
    .then(res => res.json()).then(res => {
      document.getElementById('loading').style.display = 'none';
      if(res.status === 'success') { 
        alert("✅ 綁定成功！\n藥局未來將能透過 LINE 通知您領藥。"); 
        if(liff.isInClient()) liff.closeWindow(); else goHome(); 
      } else if(res.status === 'duplicate') {
        alert("⚠️ " + res.message); 
        goHome();
      } else { alert("❌ 失敗：" + res.message); }
    }).catch(err => { document.getElementById('loading').style.display = 'none'; goHome(); });
  }
</script>
</body>
</html>
